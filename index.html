      >
        {currentCustomName ? '✎' : '+ name'}
      </button>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   Inline Slot Label Editor — per-match-card label for any
   BYE or TBD slot. Writes onto the match itself
   (match.team1Label / match.team2Label) so the label stays on
   that specific match card and does not propagate.
   ═══════════════════════════════════════════════════════════ */
function SlotLabelEditor({ matchId, drawType, slotNum, currentLabel, isTbd, onSave }) {
  const [editing, setEditing] = useState(false);
  const [value, setValue] = useState(currentLabel || '');
  const inputRef = useRef(null);

  useEffect(() => {
    setValue(currentLabel || '');
  }, [currentLabel]);

  useEffect(() => {
    if (editing && inputRef.current) {
      inputRef.current.focus();
      inputRef.current.select();
    }
  }, [editing]);

  const handleSave = () => {
    onSave(matchId, drawType, slotNum, value.trim());
    setEditing(false);
  };

  const handleCancel = () => {
    setValue(currentLabel || '');
    setEditing(false);
  };

  const handleKeyDown = (e) => {
    if (e.key === 'Enter') handleSave();
    if (e.key === 'Escape') handleCancel();
  };

  const placeholder = isTbd ? 'TBD label...' : 'BYE label...';
  const editTitle = isTbd
    ? (currentLabel ? 'Edit TBD label' : 'Add TBD label')
    : (currentLabel ? 'Edit BYE label' : 'Add BYE label');

  if (editing) {
    return (
      <div className="custom-name-inline-edit" onClick={e => e.stopPropagation()}>
        <input
          ref={inputRef}
          type="text"
          placeholder={placeholder}
          value={value}
          onChange={e => setValue(e.target.value)}
          onKeyDown={handleKeyDown}
          maxLength={60}
        />
        <button className="cn-save" onClick={handleSave} title="Save">✓</button>
        <button className="cn-cancel" onClick={handleCancel} title="Cancel">✕</button>
      </div>
    );
  }

  return (
    <div className="custom-name-row">
      <button
        className="custom-name-edit-btn"
        onClick={e => { e.stopPropagation(); setEditing(true); }}
        title={editTitle}
      >
        {currentLabel ? '✎' : '+ label'}
      </button>
    </div>
  );
}

/* In-place text editor for a match slot when the event is in manual mode.
   Local "draft" state lets the editor type freely; the change is saved on
   blur or Enter so each keystroke doesn't spam the persistence layer. */
function ManualSlotEditor({ match, drawType, slotNum, eventData, onSetSlotName, onSlotDrop }) {
  const teamId = slotNum === 1 ? match.team1Id : match.team2Id;
  const t = findTeamById(eventData, teamId);
  const displayed = teamId === 'BYE' ? 'BYE' : (t ? t.name : '');
  const [draft, setDraft] = React.useState(displayed);
  const [dirty, setDirty] = React.useState(false);

  React.useEffect(() => {
    if (!dirty) setDraft(displayed);
  }, [displayed, dirty]);

  const commit = () => {
    if (draft === displayed) { setDirty(false); return; }
    onSetSlotName(match.id, drawType, slotNum, draft);
    setDirty(false);
  };

  const handleKey = (e) => {
    if (e.key === 'Enter') { e.target.blur(); }
    if (e.key === 'Escape') { setDraft(displayed); setDirty(false); e.target.blur(); }
  };

  const dragPayload = { sourceMatchId: match.id, sourceDrawType: drawType, sourceSlotNum: slotNum };

  return (
    <div className="manual-slot-row">
      <span
        className={`manual-slot-drag-handle ${teamId ? '' : 'disabled'}`}
        draggable={!!teamId}
        onDragStart={e => {
          if (!teamId) { e.preventDefault(); return; }
          e.dataTransfer.effectAllowed = 'copy';
          e.dataTransfer.setData('text/plain', JSON.stringify(dragPayload));
        }}
        title={teamId ? 'Drag this player to another slot' : 'Empty slot — type a name first'}
      >⠿</span>
      <input
        type="text"
        className="manual-slot-input"
        value={draft}
        onChange={e => { setDraft(e.target.value); setDirty(true); }}
        onBlur={commit}
        onKeyDown={handleKey}
        placeholder="player name…"
        maxLength={80}
      />
    </div>
  );
}

function MatchCard({ match, eventData, drawType, readOnly, onSave, onEdit, onCustomName, onSlotLabel, onToggleMarshal, onManualReset, onSetSlotName, onSlotDrop, matchNumber, highlightedMatchId }) {
  const manualMode = !!(eventData && eventData.manualMode);
  const getTeamObj = (teamId) => findTeamById(eventData, teamId);

  // Resolve what to display for one slot. Returns { name, label, teamCustomName }
  // - name: the primary label ('BYE', 'TBD', or the team's name).
  // - label: the leading badge text — match-level label first, then a fallback
  //   to the seed BYE team's customDisplayName so existing seeded labels still
  //   show, then the real team's customDisplayName for non-BYE slots.
  // - teamCustomName: the real team's customDisplayName (used by CustomNameEditor).
  const computeSlotDisplay = (teamId, source, matchLabel) => {
    if (teamId && teamId !== 'BYE') {
      const t = getTeamObj(teamId);
      const teamCustomName = t ? (t.customDisplayName || '') : '';
      return { name: t ? t.name : teamId, label: teamCustomName, teamCustomName };
    }
    if (teamId === 'BYE') {
      let fallback = '';
      if (source && source.type === 'seed' && Number.isInteger(source.slot)) {
        const t = eventData.teams[source.slot];
        if (t && t.customDisplayName) fallback = t.customDisplayName;
      }
      return { name: 'BYE', label: matchLabel || fallback, teamCustomName: '' };
    }
    return { name: 'TBD', label: matchLabel || '', teamCustomName: '' };
  };

  const getWinnerDisplay = (winnerId) => {
    if (!winnerId) return 'TBD';
    if (winnerId === 'BYE') return 'BYE';
    const t = getTeamObj(winnerId);
    return t ? t.name : winnerId;
  };

  const bo3 = isBo3(match, drawType);
  const numGames = bo3 ? 3 : 1;
  const [scores1, setScores1] = useState(Array.from({ length: numGames }, (_, i) => match.score1[i] ?? ''));
  const [scores2, setScores2] = useState(Array.from({ length: numGames }, (_, i) => match.score2[i] ?? ''));

  useEffect(() => {
    setScores1(Array.from({ length: numGames }, (_, i) => match.score1[i] ?? ''));
    setScores2(Array.from({ length: numGames }, (_, i) => match.score2[i] ?? ''));
  }, [match.score1, match.score2, match.id]);

  const handleSave = () => {
    const s1 = scores1.map(v => v === '' ? null : parseInt(v));
    const s2 = scores2.map(v => v === '' ? null : parseInt(v));
    onSave(match.id, drawType, s1, s2);
  };

  const canSave = !readOnly && match.team1Id && match.team2Id && match.team1Id !== 'BYE' && match.team2Id !== 'BYE' && (!match.isComplete || manualMode);
  const canEdit = !readOnly && match.isComplete && !match.isBye && onEdit;

  const handleDropOnSlot = (slotNum) => (e) => {
    e.preventDefault();
    if (readOnly || !manualMode || !onSlotDrop) return;
    let payload;
    try { payload = JSON.parse(e.dataTransfer.getData('text/plain')); }
    catch (_) { return; }
    if (!payload || !payload.sourceMatchId) return;
    onSlotDrop(payload.sourceMatchId, payload.sourceDrawType, payload.sourceSlotNum,
               match.id, drawType, slotNum);
  };
  const allowDrop = (e) => {
    if (readOnly || !manualMode || !onSlotDrop) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = 'copy';
  };
  let label = match.customLabel || match.id;
  if (bo3 && !label.toLowerCase().includes('best of 3')) label += ' (Bo3)';

  const t1cls = match.isComplete ? (match.winnerId === match.team1Id ? 'winner' : 'loser') : '';
  const t2cls = match.isComplete ? (match.winnerId === match.team2Id ? 'winner' : 'loser') : '';

  const isHighlighted = highlightedMatchId === match.id;
  const downstreamCount = canEdit && !manualMode ? countDownstreamPlayed(eventData, match.id) : 0;

  const t1Display = computeSlotDisplay(match.team1Id, match.team1Source, match.team1Label);
  const t2Display = computeSlotDisplay(match.team2Id, match.team2Source, match.team2Label);
  const t1IsLabelable = match.team1Id === 'BYE' || !match.team1Id;
  const t2IsLabelable = match.team2Id === 'BYE' || !match.team2Id;

  return (
    <div
      id={`match-${match.id}`}
      className={`match-card ${match.isComplete ? (match.isBye ? 'bye' : 'complete') : ''} ${isHighlighted ? 'highlighted' : ''}`}
    >
      <div className="match-label-row">
        <div className="label-left">
          {matchNumber && <span className="match-number-badge">Match #{matchNumber}</span>}
          <span className="match-label" style={{ marginBottom: 0 }}>{label}</span>
        </div>
        {!readOnly && onToggleMarshal && !match.isBye && (
          <button
            type="button"
            className={`match-marshal-toggle ${match.marshalled ? 'on' : ''}`}
            onClick={() => onToggleMarshal(match.id, drawType)}
            title={match.marshalled ? 'Marshalled — click to clear' : 'Click to mark as marshalled'}
          >
            {match.marshalled ? '✓ M' : 'M'}
          </button>
        )}
      </div>
      <div
        className={`match-team ${t1cls} ${manualMode ? 'manual' : ''}`}
        onDragOver={allowDrop}
        onDrop={handleDropOnSlot(1)}
      >
        <div className="match-team-name-block">
          {manualMode && !readOnly && onSetSlotName ? (
            <ManualSlotEditor
              match={match}
              drawType={drawType}
              slotNum={1}
              eventData={eventData}
              onSetSlotName={onSetSlotName}
              onSlotDrop={onSlotDrop}
            />
          ) : (
            <div className="match-team-name">
              {t1Display.label ? <><span className="custom-name-tag" style={{marginRight: 4}}>{t1Display.label}</span> {t1Display.name}</> : t1Display.name}
            </div>
          )}
          {!readOnly && onCustomName && match.team1Id && match.team1Id !== 'BYE' && (
            <CustomNameEditor
              teamId={match.team1Id}
              currentCustomName={t1Display.teamCustomName}
              onSave={onCustomName}
            />
          )}
          {!readOnly && onSlotLabel && t1IsLabelable && (
            <SlotLabelEditor
              matchId={match.id}
              drawType={drawType}
              slotNum={1}
              currentLabel={match.team1Label || ''}
              isTbd={!match.team1Id}
              onSave={onSlotLabel}
            />
          )}
        </div>
        <div className="match-scores">
          {Array.from({ length: numGames }).map((_, g) => (
            <input key={g} type="number" className="score-box" min={0} max={30} disabled={(match.isComplete && !manualMode) || readOnly}
              value={scores1[g]} onChange={e => { const a = [...scores1]; a[g] = e.target.value; setScores1(a); }} />
          ))}
        </div>
      </div>
      <div
        className={`match-team ${t2cls} ${manualMode ? 'manual' : ''}`}
        onDragOver={allowDrop}
        onDrop={handleDropOnSlot(2)}
      >
        <div className="match-team-name-block">
          {manualMode && !readOnly && onSetSlotName ? (
            <ManualSlotEditor
              match={match}
              drawType={drawType}
              slotNum={2}
              eventData={eventData}
              onSetSlotName={onSetSlotName}
              onSlotDrop={onSlotDrop}
            />
          ) : (
            <div className="match-team-name">
              {t2Display.label ? <><span className="custom-name-tag" style={{marginRight: 4}}>{t2Display.label}</span> {t2Display.name}</> : t2Display.name}
            </div>
          )}
          {!readOnly && onCustomName && match.team2Id && match.team2Id !== 'BYE' && (
            <CustomNameEditor
              teamId={match.team2Id}
              currentCustomName={t2Display.teamCustomName}
              onSave={onCustomName}
            />
          )}
          {!readOnly && onSlotLabel && t2IsLabelable && (
            <SlotLabelEditor
              matchId={match.id}
              drawType={drawType}
              slotNum={2}
              currentLabel={match.team2Label || ''}
              isTbd={!match.team2Id}
              onSave={onSlotLabel}
            />
          )}
        </div>
        <div className="match-scores">
          {Array.from({ length: numGames }).map((_, g) => (
            <input key={g} type="number" className="score-box" min={0} max={30} disabled={(match.isComplete && !manualMode) || readOnly}
              value={scores2[g]} onChange={e => { const a = [...scores2]; a[g] = e.target.value; setScores2(a); }} />
          ))}
        </div>
      </div>
      {canSave && <button className="match-save-btn" onClick={handleSave}>Save Score</button>}
      {canEdit && (
        <>
          <button className="match-edit-btn" onClick={() => onEdit(match.id, drawType)}>
            {manualMode ? '↺ Clear Scores' : '✏️ Edit Score'}
          </button>
          {downstreamCount > 0 && (
            <div className="match-cascade-warning">⚠ Will also reset {downstreamCount} dependent match{downstreamCount !== 1 ? 'es' : ''}</div>
          )}
        </>
      )}
      {!readOnly && onManualReset && (drawType === 'CD' || drawType === 'WCD') && !manualMode && (
        <button
          className="match-manual-btn"
          onClick={() => onManualReset(match.id, drawType)}
          title={drawType === 'WCD' ? 'Reset and manually populate this WCD match. Only WCD matches will be affected.' : 'Reset and manually populate this CD match. Only CD matches will be affected.'}
        >
          ✎ Manual Reset / Populate
        </button>
      )}
      {match.manualOverride && <div className="match-manual-tag">Manually populated</div>}
      {match.isBye && <div className="match-bye-text">{getWinnerDisplay(match.winnerId)} advances (BYE)</div>}
      {match.isComplete && !match.isBye && <div className="match-winner-text">✓ Winning Team: {getWinnerDisplay(match.winnerId)}</div>}
    </div>
  );
}

function DrawView({ drawData, eventData, drawType, readOnly, onSave, onEdit, onCustomName, onSlotLabel, onToggleMarshal, onManualReset, onSetSlotName, onSlotDrop, matchNumberMap, highlightedMatchId }) {
  if (!drawData || !drawData.rounds || drawData.rounds.length === 0) return <p className="text-dim" style={{padding:10}}>No draw data.</p>;
  const roundLabels = {
    MD: ['Round 1', 'Round 2', 'Quarter-Finals', 'Semi-Finals', 'Final'],
    CD: ['CD Round 1', 'CD Round 2', 'CD Playdown 1', 'CD vs QF Losing Teams', 'CD Playdown 2', 'CD Semi-Finals', 'CD Final', '2nd Place'],
    WCD: ['WCD Round 1', 'WCD Semi-Finals', 'WCD Final']
  };
  const labels = roundLabels[drawType] || [];
  const maxMatches = drawData.rounds.reduce((mx, r) => Math.max(mx, r.length), 1);

  return (
    <div className="draw-container">
      {drawData.rounds.map((roundMatches, ri) => {
        const span = Math.max(1, Math.round(maxMatches / Math.max(roundMatches.length, 1)));
        return (
          <div key={ri} className="round-col" style={{ '--num-rows': maxMatches }}>
            <div className="round-header">{labels[ri] || `Round ${ri + 1}`}</div>
            {roundMatches.map(m => (
              <div key={m.id} className="round-slot" style={{ '--row-span': span }}>
                <MatchCard
                  match={m}
                  eventData={eventData}
                  drawType={drawType}
                  readOnly={readOnly}
                  onSave={onSave}
                  onEdit={onEdit}
                  onCustomName={onCustomName}
                  onSlotLabel={onSlotLabel}
                  onToggleMarshal={onToggleMarshal}
                  onManualReset={onManualReset}
                  onSetSlotName={onSetSlotName}
                  onSlotDrop={onSlotDrop}
                  matchNumber={matchNumberMap ? matchNumberMap[m.id] : null}
                  highlightedMatchId={highlightedMatchId}
                />
              </div>
            ))}
          </div>
        );
      })}
    </div>
  );
}

function TournamentView({ tournamentId, user, readOnly, onBack }) {
  const [meta, setMeta] = useState(null);
  const [events, setEvents] = useState(null);
  const [activeEvent, setActiveEvent] = useState('BS');
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  const [showShare, setShowShare] = useState(false);
  const [showEditor, setShowEditor] = useState(false);
  const [highlightedMatchId, setHighlightedMatchId] = useState(null);

  useEffect(() => {
    (async () => {
      setLoading(true);
      const m = await loadTournamentMeta(tournamentId);
      const ev = await loadTournamentEvents(tournamentId);
      Object.keys(EVENT_CODES).forEach(eid => {
        if (!ev[eid]) ev[eid] = createEventObject(eid);
        if (!ev[eid].teams || ev[eid].teams.length < TOTAL_TEAMS) ev[eid].teams = createInitialTeams(eid);
        if (!ev[eid].mainDraw || !ev[eid].mainDraw.rounds || !Array.isArray(ev[eid].mainDraw.rounds)) ev[eid].mainDraw = generateMainDraw();
        if (!ev[eid].consolationDraw || !ev[eid].consolationDraw.rounds || !Array.isArray(ev[eid].consolationDraw.rounds)) ev[eid].consolationDraw = generateConsolationDraw();
        if (!ev[eid].waterfallConsolationDraw || !ev[eid].waterfallConsolationDraw.rounds || !Array.isArray(ev[eid].waterfallConsolationDraw.rounds)) ev[eid].waterfallConsolationDraw = generateWaterfallDraw();
        if (!Array.isArray(ev[eid].adhocTeams)) ev[eid].adhocTeams = [];
        if (typeof ev[eid].manualMode !== 'boolean') ev[eid].manualMode = false;
        ev[eid].teams.forEach((t, idx) => {
          if (t.originalPlayerSlot === undefined) t.originalPlayerSlot = idx;
          t.mainDrawLosses = t.mainDrawLosses || 0;
          t.consolationLosses = t.consolationLosses || 0;
          if (t.customDisplayName === undefined) t.customDisplayName = '';
        });
        ev[eid].adhocTeams.forEach(t => {
          if (t.customDisplayName === undefined) t.customDisplayName = '';
          t.mainDrawLosses = t.mainDrawLosses || 0;
          t.consolationLosses = t.consolationLosses || 0;
        });
        populateAllDraws(ev[eid]);
      });
      setMeta(m);
      setEvents(ev);
      setLoading(false);
    })();
  }, [tournamentId]);

  useEffect(() => {
    if (!readOnly || !events) return;
    const unsubs = Object.keys(EVENT_CODES).map(eid =>
      subscribeToEvent(tournamentId, eid, (data) => {
        setEvents(prev => {
          const next = { ...prev, [eid]: data };
          if (!Array.isArray(next[eid].mainDraw?.rounds)) next[eid].mainDraw = generateMainDraw();
          if (!Array.isArray(next[eid].consolationDraw?.rounds)) next[eid].consolationDraw = generateConsolationDraw();
          if (!Array.isArray(next[eid].waterfallConsolationDraw?.rounds)) next[eid].waterfallConsolationDraw = generateWaterfallDraw();
          if (data.teams) {
            next[eid].teams.forEach(t => {
              if (t.customDisplayName === undefined) t.customDisplayName = '';
            });
            populateAllDraws(next[eid]);
          }
          return next;
        });
      })
    );
    return () => unsubs.forEach(u => u());
  }, [readOnly, !!events, tournamentId]);

  const canEdit = !readOnly && meta && user && (meta.ownerId === user.uid || (meta.authorizedEditors && meta.authorizedEditors.includes(user.email)));

  const saveEvent = async (eid, eventData) => {
    setSaving(true);
    try { await saveEventData(tournamentId, eid, eventData); }
    catch (err) { alert('Save error: ' + err.message); }
    setSaving(false);
  };

  /* mutate(updater) clones the active event, runs the updater (which may
     mutate the clone or return false to abort), persists the new state via
     setEvents (functional form to avoid stale-closure races — bug 5: rapid
     custom-name edits would drop changes when each handler captured the
     pre-edit `events` value), and writes the result to Firestore. */
  const mutate = useCallback(async (updater) => {
    if (!canEdit) return;
    let toSave = null;
    let savedEid = null;
    setEvents(prev => {
      if (!prev) return prev;
      const eid = activeEvent;
      if (!prev[eid]) return prev;
      const ev = JSON.parse(JSON.stringify(prev[eid]));
      const result = updater(ev, prev);
      if (result === false) return prev;
      toSave = ev;
      savedEid = eid;
      return { ...prev, [eid]: ev };
    });
    if (toSave && savedEid) {
      setSaving(true);
      try { await saveEventData(tournamentId, savedEid, toSave); }
      catch (err) { alert('Save error: ' + err.message); }
      setSaving(false);
    }
  }, [canEdit, activeEvent, tournamentId]);

  const handleScoreSave = async (matchId, drawType, s1, s2) => {
    if (!canEdit) return;
    let validationFailed = false;
    await mutate((ev) => {
      const match = findMatch(ev, drawType, matchId);
      if (!match) return false;
      match.score1 = s1; match.score2 = s2;
      const result = determineMatchWinner(match, drawType);
      if (!result.valid) { validationFailed = true; return false; }
      match.winnerId = result.winnerId;
      match.loserId = result.loserId;
      match.isComplete = true;
      if (!match.isOverallChampionship && !match.isSecondPlacePlayoff) {
        const loser = ev.teams.find(t => t.id === match.loserId);
        if (loser) {
          if (drawType === 'MD') loser.mainDrawLosses = (loser.mainDrawLosses || 0) + 1;
          else if (drawType === 'CD') loser.consolationLosses = (loser.consolationLosses || 0) + 1;
        }
      }
      populateAllDraws(ev);
    });
    if (validationFailed) alert('Scores incomplete or invalid.');
  };

  const handleScoreEdit = async (matchId, drawType) => {
    if (!canEdit) return;
    const cur = events[activeEvent];
    const isManual = !!(cur && cur.manualMode);
    if (isManual) {
      if (!confirm('Clear this match\'s score? In manual mode no other matches will be reset.')) return;
      await mutate((ev) => {
        const m = findMatch(ev, drawType, matchId);
        if (!m) return false;
        m.score1 = []; m.score2 = [];
        m.winnerId = null; m.loserId = null;
        m.isComplete = false; m.isBye = false;
        m.marshalled = false;
      });
      return;
    }
    const downstream = countDownstreamPlayed(cur, matchId);
    let msg = `Reset the score for this match so you can re-enter it?`;
    if (downstream > 0) {
      msg = `This will also reset ${downstream} downstream match${downstream !== 1 ? 'es' : ''} whose results depend on this one. Continue?`;
    }
    if (!confirm(msg)) return;
    await mutate((ev) => {
      resetMatchAndCascade(ev, matchId);
      populateAllDraws(ev);
    });
  };

  /* ═══════ Custom Display Name handler ═══════ */
  const handleCustomNameUpdate = useCallback(async (teamId, customName) => {
    await mutate((ev) => {
      const team = ev.teams.find(t => t.id === teamId)
        || (ev.adhocTeams || []).find(t => t.id === teamId);
      if (!team) return false;
      team.customDisplayName = customName;
    });
  }, [mutate]);

  /* ═══════ Slot Label handler — per-match-card label for any
     BYE or TBD slot. Writes onto the match itself so the label
     stays on this match card and does not propagate. ═══════ */
  const handleSlotLabelUpdate = useCallback(async (matchId, drawType, slotNum, label) => {
    await mutate((ev) => {
      const match = findMatch(ev, drawType, matchId);
      if (!match) return false;
      if (slotNum === 1) match.team1Label = label;
      else if (slotNum === 2) match.team2Label = label;
    });
  }, [mutate]);

  /* ═══════ Marshal toggle handler ═══════ */
  const handleToggleMarshal = useCallback(async (matchId, drawType) => {
    await mutate((ev) => {
      const match = findMatch(ev, drawType, matchId);
      if (!match) return false;
      match.marshalled = !match.marshalled;
    });
  }, [mutate]);

  /* ═══════ Feature 1 — Add a late-entry player into a BYE slot ═══════ */
  const handleAddPlayer = useCallback(async (slotIndex) => {
    if (!canEdit) return;
    const cur = events[activeEvent];
    if (!cur || !cur.teams || !cur.teams[slotIndex]) return;
    if (cur.teams[slotIndex].id !== 'BYE') {
      alert('That slot already has a player.');
      return;
    }
    const name = prompt('Enter the late entry\'s team name:');
    if (name === null) return;
    if (!name.trim()) { alert('Name cannot be empty.'); return; }
    const mdR1Idx = Math.floor(slotIndex / 2);
    const mdR1Match = cur.mainDraw && cur.mainDraw.rounds && cur.mainDraw.rounds[0]
      ? cur.mainDraw.rounds[0][mdR1Idx] : null;
    if (mdR1Match && mdR1Match.isComplete && !mdR1Match.isBye) {
      if (!confirm('Their MD R1 match has already been played. Adding this player will reset that match and any matches downstream. Continue?')) return;
    }
    await mutate((ev) => {
      if (slotIndex < 0 || slotIndex >= ev.teams.length) return false;
      if (ev.teams[slotIndex].id !== 'BYE') return false;
      const newId = `${activeEvent}_late_${Date.now()}_${Math.random().toString(36).slice(2,7)}`;
      ev.teams[slotIndex] = {
        id: newId,
        name: name.trim(),
        customDisplayName: '',
        originalPlayerSlot: slotIndex,
        mainDrawLosses: 0,
        consolationLosses: 0
      };
      const m = ev.mainDraw.rounds[0][mdR1Idx];
      if (m) {
        // Reset the MD R1 match completely so the new player can play it
        m.team1Id = null; m.team2Id = null;
        m.score1 = []; m.score2 = [];
        m.winnerId = null; m.loserId = null;
        m.isComplete = false; m.isBye = false;
        m.marshalled = false;
        // Also cascade-reset downstream so any prior auto-advance result
        // (BYE-vs-real, etc.) is cleared
        resetMatchAndCascade(ev, m.id);
      }
      populateAllDraws(ev);
    });
  }, [mutate, canEdit, events, activeEvent]);

  /* ═══════ Feature 1 — Remove a no-show player, replacing with a BYE ═══════ */
  const handleRemovePlayer = useCallback(async (slotIndex) => {
    if (!canEdit) return;
    const cur = events[activeEvent];
    if (!cur || !cur.teams || !cur.teams[slotIndex]) return;
    const team = cur.teams[slotIndex];
    if (team.id === 'BYE') return;
    if (!confirm(`Remove "${team.name}" from the draw and replace with a BYE? Their MD R1 match (and any downstream matches involving them) will be reset.`)) return;
    await mutate((ev) => {
      if (slotIndex < 0 || slotIndex >= ev.teams.length) return false;
      if (ev.teams[slotIndex].id === 'BYE') return false;
      const removedId = ev.teams[slotIndex].id;
      ev.teams[slotIndex] = {
        id: 'BYE', name: 'BYE', customDisplayName: '',
        originalPlayerSlot: -1, mainDrawLosses: 0, consolationLosses: 0
      };
      const mdR1Idx = Math.floor(slotIndex / 2);
      const m = ev.mainDraw.rounds[0][mdR1Idx];
      if (m) {
        m.team1Id = null; m.team2Id = null;
        m.score1 = []; m.score2 = [];
        m.winnerId = null; m.loserId = null;
        m.isComplete = false; m.isBye = false;
        m.marshalled = false;
        resetMatchAndCascade(ev, m.id);
      }
      // Brute-force scrub any lingering refs to the removed team — covers
      // cases where the team had advanced into CD/WCD before removal.
      [ev.mainDraw, ev.consolationDraw, ev.waterfallConsolationDraw].forEach(draw => {
        if (!draw || !draw.rounds) return;
        draw.rounds.forEach(round => round.forEach(mm => {
          let cleared = false;
          if (mm.team1Id === removedId) { mm.team1Id = null; cleared = true; }
          if (mm.team2Id === removedId) { mm.team2Id = null; cleared = true; }
          if (cleared) {
            mm.score1 = []; mm.score2 = [];
            mm.winnerId = null; mm.loserId = null;
            mm.isComplete = false; mm.isBye = false;
            mm.marshalled = false;
          }
        }));
      });
      populateAllDraws(ev);
    });
  }, [mutate, canEdit, events, activeEvent]);

  /* ═══════ Feature 3 — Event-wide manual mode toggle ═══════
     Flipping this on freezes all automatic placement / propagation
     for the active event so the editor can rearrange match cards
     freely (typed names, drag-drop). Existing assignments and
     winnerIds remain in place and stay editable. */
  const handleToggleManualMode = useCallback(async () => {
    if (!canEdit) return;
    const cur = events && events[activeEvent];
    if (!cur) return;
    const turningOn = !cur.manualMode;
    const msg = turningOn
      ? `Switch ${EVENT_CODES[activeEvent]} to MANUAL mode? Every match card becomes editable. Winners and losers will no longer auto-advance — you'll move them manually by drag-and-drop or by typing names. Existing assignments stay in place.`
      : `Switch ${EVENT_CODES[activeEvent]} back to AUTO mode? Auto source-based placement and propagation will resume. Manually-set names remain.`;
    if (!confirm(msg)) return;
    await mutate(ev => {
      ev.manualMode = !ev.manualMode;
      // When returning to auto mode, run a populate pass so any TBD slots
      // can refill from sources without disturbing manual entries.
      if (!ev.manualMode) populateAllDraws(ev);
    });
  }, [mutate, canEdit, events, activeEvent]);

  /* Set or clear a match slot's team via the manual editor input. An
     empty value clears the slot; non-empty values create (or reuse) an
     adhoc team with that exact name. */
  const handleSetSlotName = useCallback(async (matchId, drawType, slotNum, rawName) => {
    if (!canEdit) return;
    await mutate(ev => {
      const m = findMatch(ev, drawType, matchId);
      if (!m) return false;
      const trimmed = (rawName || '').trim();
      if (!Array.isArray(ev.adhocTeams)) ev.adhocTeams = [];
      let newId;
      if (!trimmed) {
        newId = null;
      } else if (trimmed.toUpperCase() === 'BYE') {
        newId = 'BYE';
      } else {
        // Reuse an existing seeded team that exactly matches the typed name,
        // otherwise reuse an adhoc with that name, otherwise create one.
        let reuse = ev.teams.find(t => t.id !== 'BYE' && t.name === trimmed);
        if (!reuse) reuse = ev.adhocTeams.find(t => t.name === trimmed);
        if (!reuse) {
          const id = `${ev.id || activeEvent}_manual_${Date.now()}_${Math.random().toString(36).slice(2,7)}_${slotNum}`;
          reuse = { id, name: trimmed, customDisplayName: '',
            originalPlayerSlot: -1, mainDrawLosses: 0, consolationLosses: 0 };
          ev.adhocTeams.push(reuse);
        }
        newId = reuse.id;
      }
      // Setting team1Id/team2Id invalidates any stored result on this match.
      if (slotNum === 1) {
        if (m.team1Id !== newId) {
          m.team1Id = newId;
          m.score1 = []; m.score2 = [];
          m.winnerId = null; m.loserId = null;
          m.isComplete = false; m.isBye = false;
        }
      } else {
        if (m.team2Id !== newId) {
          m.team2Id = newId;
          m.score1 = []; m.score2 = [];
          m.winnerId = null; m.loserId = null;
          m.isComplete = false; m.isBye = false;
        }
      }
    });
  }, [mutate, canEdit, activeEvent]);

  /* Drop handler — copies the dragged source slot's teamId to the target
     slot. Source isn't cleared (so the editor can leave the winner shown
     in the source match and also seat them in the next round). */
  const handleSlotDrop = useCallback(async (sourceMatchId, sourceDrawType, sourceSlotNum, targetMatchId, targetDrawType, targetSlotNum) => {
    if (!canEdit) return;
    if (sourceMatchId === targetMatchId && sourceSlotNum === targetSlotNum) return;
    await mutate(ev => {
      const src = findMatch(ev, sourceDrawType, sourceMatchId);
      const tgt = findMatch(ev, targetDrawType, targetMatchId);
      if (!src || !tgt) return false;
      const srcId = sourceSlotNum === 1 ? src.team1Id : src.team2Id;
      if (!srcId) return false;
      if (targetSlotNum === 1) {
        if (tgt.team1Id !== srcId) {
          tgt.team1Id = srcId;
          tgt.score1 = []; tgt.score2 = [];
          tgt.winnerId = null; tgt.loserId = null;
          tgt.isComplete = false; tgt.isBye = false;
        }
      } else {
        if (tgt.team2Id !== srcId) {
          tgt.team2Id = srcId;
          tgt.score1 = []; tgt.score2 = [];
          tgt.winnerId = null; tgt.loserId = null;
          tgt.isComplete = false; tgt.isBye = false;
        }
      }
    });
  }, [mutate, canEdit]);

  /* ═══════ Feature 2 — Manually reset & populate a CD or WCD match.
     Cascade is scoped to that draw only, so a WCD reset never touches
     MD or CD (and vice versa for CD). ═══════ */
  const handleManualReset = useCallback(async (matchId, drawType) => {
    if (!canEdit) return;
    if (drawType !== 'CD' && drawType !== 'WCD') return;
    const drawLabel = drawType === 'CD' ? 'consolation' : 'waterfall consolation';
    const promptMsg = `Manually reset this match and any downstream ${drawLabel} matches? Main draw${drawType === 'WCD' ? ' and consolation draw' : ''} will not be affected.`;
    if (!confirm(promptMsg)) return;
    const team1Name = prompt('Enter Team 1 name (leave blank to leave as BYE):');
    if (team1Name === null) return;
    const team2Name = prompt('Enter Team 2 name (leave blank to leave as BYE):');
    if (team2Name === null) return;
    await mutate((ev) => {
      const match = findMatch(ev, drawType, matchId);
      if (!match) return false;
      resetMatchAndCascadeInDraw(ev, matchId, drawType);
      match.team1Id = null; match.team2Id = null;
      match.score1 = []; match.score2 = [];
      match.winnerId = null; match.loserId = null;
      match.isComplete = false; match.isBye = false;
      match.marshalled = false;
      match.manualOverride = true;
      if (!Array.isArray(ev.adhocTeams)) ev.adhocTeams = [];
      const mkAdhoc = (name, suffix) => {
        const id = `${ev.id || activeEvent}_adhoc_${Date.now()}_${Math.random().toString(36).slice(2,7)}_${suffix}`;
        ev.adhocTeams.push({
          id, name: name.trim(), customDisplayName: '',
          originalPlayerSlot: -1, mainDrawLosses: 0, consolationLosses: 0
        });
        return id;
      };
      if (team1Name.trim()) match.team1Id = mkAdhoc(team1Name, '1');
      else match.team1Id = 'BYE';
      if (team2Name.trim()) match.team2Id = mkAdhoc(team2Name, '2');
      else match.team2Id = 'BYE';
      // Run populate to auto-resolve BYE outcomes (e.g. real-vs-BYE)
      populateAllDraws(ev);
    });
  }, [mutate, canEdit, activeEvent]);

  const handleSaveTeams = async () => {
    if (!canEdit) return;
    setSaving(true);
    try { await saveAllEvents(tournamentId, events); alert('All team names saved!'); }
    catch (err) { alert('Error: ' + err.message); }
    setSaving(false);
  };

  const handleShuffle = async () => {
    if (!canEdit) return;
    const ev = JSON.parse(JSON.stringify(events[activeEvent]));
    const hasPlayed = [ev.mainDraw, ev.consolationDraw, ev.waterfallConsolationDraw].some(draw =>
      draw && draw.rounds && draw.rounds.some(round => round.some(m => m.isComplete && !m.isBye))
    );
    if (hasPlayed) { alert('Cannot shuffle: non-BYE matches have been played. Reset the event first.'); return; }
    if (!confirm(`Shuffle entries for ${EVENT_CODES[activeEvent]}? Any teams with default or blank names will become BYEs. BYEs will be evenly distributed across the draw.`)) return;
    shuffleEventTeams(ev);
    populateAllDraws(ev);
    const newEvents = { ...events, [activeEvent]: ev };
    setEvents(newEvents);
    await saveEvent(activeEvent, ev);
    const byeCount = ev.teams.filter(t => t.id === 'BYE').length;
    const realCount = TOTAL_TEAMS - byeCount;
    if (byeCount > 16) {
      alert(`Shuffled! ${byeCount} BYEs created (${realCount} real team${realCount !== 1 ? 's' : ''}). Round 1 will be entirely skipped — all teams auto-advance to Round 2.`);
    } else if (byeCount > 0) {
      alert(`Shuffled! ${byeCount} placeholder/blank team(s) converted to BYEs. Evenly distributed, no BYE vs BYE.`);
    } else {
      alert('Shuffled!');
    }
  };

  const handleResetEvent = async () => {
    if (!canEdit) return;
    if (!confirm(`Are you sure? This will reset ALL tournament data for ${EVENT_CODES[activeEvent]} including all scores, draws, and team assignments. This cannot be undone.`)) return;
    const fresh = createEventObject(activeEvent);
    const newEvents = { ...events, [activeEvent]: fresh };
    setEvents(newEvents);
    await saveEvent(activeEvent, fresh);
    alert('Event reset.');
  };

  const handleExportJSON = () => {
    const blob = new Blob([JSON.stringify(events, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `tournament_${tournamentId}_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(a.href);
  };

  const handleImportJSON = () => {
    if (!canEdit) return;
    const inp = document.createElement('input');
    inp.type = 'file'; inp.accept = '.json';
    inp.onchange = async (e) => {
      const file = e.target.files[0]; if (!file) return;
      if (!confirm('Import will overwrite ALL event data. Continue?')) return;
      const text = await file.text();
      try {
        const imported = JSON.parse(text);
        Object.keys(EVENT_CODES).forEach(eid => {
          if (!imported[eid]) imported[eid] = createEventObject(eid);
          if (!imported[eid].teams || imported[eid].teams.length < TOTAL_TEAMS) imported[eid].teams = createInitialTeams(eid);
          if (!imported[eid].mainDraw || !imported[eid].mainDraw.rounds) imported[eid].mainDraw = generateMainDraw();
          if (!imported[eid].consolationDraw || !imported[eid].consolationDraw.rounds) imported[eid].consolationDraw = generateConsolationDraw();
          if (!imported[eid].waterfallConsolationDraw || !imported[eid].waterfallConsolationDraw.rounds) imported[eid].waterfallConsolationDraw = generateWaterfallDraw();
          if (!Array.isArray(imported[eid].adhocTeams)) imported[eid].adhocTeams = [];
          if (typeof imported[eid].manualMode !== 'boolean') imported[eid].manualMode = false;
          imported[eid].mainDraw = deserializeDrawFromFirestore(imported[eid].mainDraw);
          imported[eid].consolationDraw = deserializeDrawFromFirestore(imported[eid].consolationDraw);
          imported[eid].waterfallConsolationDraw = deserializeDrawFromFirestore(imported[eid].waterfallConsolationDraw);
          imported[eid].teams.forEach((t, idx) => {
            if (t.originalPlayerSlot === undefined) t.originalPlayerSlot = idx;
            t.mainDrawLosses = t.mainDrawLosses || 0;
            t.consolationLosses = t.consolationLosses || 0;
            if (t.customDisplayName === undefined) t.customDisplayName = '';
          });
          imported[eid].adhocTeams.forEach(t => {
            if (t.customDisplayName === undefined) t.customDisplayName = '';
            t.mainDrawLosses = t.mainDrawLosses || 0;
            t.consolationLosses = t.consolationLosses || 0;
          });
          populateAllDraws(imported[eid]);
        });
        setEvents(imported);
        await saveAllEvents(tournamentId, imported);
        alert('Imported!');
      } catch (err) { alert('Invalid file: ' + err.message); }
    };
    inp.click();
  };

  const handleExportCSV = () => {
    const csv = exportTeamsCSV(events);
    const blob = new Blob([csv], { type: 'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `teams_${tournamentId}.csv`;
    a.click();
    URL.revokeObjectURL(a.href);
  };

  const handleImportCSV = () => {
    if (!canEdit) return;
    const inp = document.createElement('input');
    inp.type = 'file'; inp.accept = '.csv';
    inp.onchange = async (e) => {
      const file = e.target.files[0]; if (!file) return;
      if (!confirm('Import team names from CSV?')) return;
      const text = await file.text();
      const result = parseTeamsCSV(text);
      if (result.error) { alert(result.error); return; }
      const evCopy = JSON.parse(JSON.stringify(events));
      let count = 0;
      result.updates.forEach(u => {
        if (evCopy[u.eventCode] && evCopy[u.eventCode].teams) {
          const team = evCopy[u.eventCode].teams.find(t => t.id === u.teamId);
          if (team) {
            if (team.name !== u.teamName) { team.name = u.teamName; count++; }
            if (u.customDisplayName !== undefined && team.customDisplayName !== u.customDisplayName) {
              team.customDisplayName = u.customDisplayName;
              count++;
            }
          }
        }
      });
      if (count > 0) {
        setEvents(evCopy);
        await saveAllEvents(tournamentId, evCopy);
        alert(`${count} update(s) applied.`);
      } else { alert('No names changed.'); }
    };
    inp.click();
  };

  const updateTeamName = (eventId, teamId, name) => {
    setEvents(prev => {
      const next = { ...prev };
      next[eventId] = { ...next[eventId], teams: next[eventId].teams.map(t => t.id === teamId ? { ...t, name } : t) };
      return next;
    });
  };

  // BYE labels write by team-array slot index since all BYEs share id 'BYE'.
  // Local-only update; persisted via the "Save Teams" button like player names.
  const updateByeCustomName = (eventId, slotIndex, name) => {
    setEvents(prev => {
      const next = { ...prev };
      next[eventId] = {
        ...next[eventId],
        teams: next[eventId].teams.map((t, i) => i === slotIndex ? { ...t, customDisplayName: name } : t)
      };
      return next;
    });
  };

  const handleScrollToMatch = useCallback((matchId) => {
    setHighlightedMatchId(matchId);
    setTimeout(() => {
      const el = document.getElementById(`match-${matchId}`);
      if (el) {
        el.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
      }
    }, 50);
    setTimeout(() => setHighlightedMatchId(null), 4000);
  }, []);

  if (loading) return <div className="loading-center"><span className="spinner"></span> Loading tournament...</div>;
  if (!meta || !events) return <div className="app-shell"><div className="card"><p>Tournament not found.</p><button className="btn" onClick={onBack}>Back</button></div></div>;

  const ev = events[activeEvent];
  if (ev) populateAllDraws(ev);

  const matchNumberMap = ev ? buildMatchNumberMap(ev) : {};

  return (
    <div className="app-shell">
      <div className="top-bar">
        <h1>
          <span style={{cursor:'pointer', opacity: 0.7, fontSize: '0.9em'}} onClick={onBack}>←</span>
          <span className="icon">🏸</span>
          {meta.name}
        </h1>
        <div className="top-bar-actions">
          {saving && <span className="text-dim text-sm">Saving...</span>}
          {!readOnly && <button className="btn btn-sm btn-purple" onClick={() => setShowShare(true)}>📱 Share QR</button>}
          {!readOnly && <button className="btn btn-sm" onClick={() => setShowEditor(true)}>👥 Editors</button>}
          {!readOnly && user && <span className="user-badge">{user.email}</span>}
          {readOnly && <span className="user-badge" style={{background:'var(--orange-dim)', color:'var(--orange)'}}>View Only</span>}
          {!readOnly && <button className="btn btn-sm" onClick={onBack}>My Tournaments</button>}
        </div>
      </div>
      {readOnly && <div className="readonly-banner">🔒 Read-only view — scores and teams cannot be edited</div>}
      {canEdit && (
        <div className="controls-bar">
          <button className="btn btn-green btn-sm" onClick={handleSaveTeams}>💾 Save Teams</button>
          <button className="btn btn-orange btn-sm" onClick={handleShuffle}>🔀 Shuffle Event</button>
          <span className="sep"></span>
          <button className="btn btn-sm" onClick={handleExportJSON}>⬇ Export JSON</button>
          <button className="btn btn-sm" onClick={handleImportJSON}>⬆ Import JSON</button>
          <span className="sep"></span>
          <button className="btn btn-sm" onClick={handleExportCSV}>⬇ Teams CSV</button>
          <button className="btn btn-sm" onClick={handleImportCSV}>⬆ Teams CSV</button>
          <div style={{ flex: 1 }}></div>
          <span className="text-sm" style={{ color: 'var(--red)', fontWeight: 500, display: 'flex', alignItems: 'center', gap: 4 }}>⚠ Caution</span>
          <button
            className={`btn btn-sm ${ev && ev.manualMode ? 'btn-purple' : ''}`}
            onClick={handleToggleManualMode}
            title={ev && ev.manualMode ? 'Manual mode is ON for this event — click to return to auto mode.' : 'Turn this event into a fully manual draw — every name and score becomes editable, and winners are moved by drag-drop or typing.'}
          >
            {ev && ev.manualMode ? '🔓 Manual: ON' : '🔓 Manual Mode'}
          </button>
          <button className="btn btn-danger btn-sm" onClick={handleResetEvent}>🗑 Reset Event</button>
        </div>
      )}
      <div className="event-tabs">
        {Object.keys(EVENT_CODES).map(eid => (
          <button key={eid} className={`event-tab ${eid === activeEvent ? 'active' : ''}`} onClick={() => setActiveEvent(eid)}>
            {EVENT_CODES[eid]}
          </button>
        ))}
      </div>

      {ev && (
        <PlayerSearchBar
          eventData={ev}
          matchNumberMap={matchNumberMap}
          onScrollToMatch={handleScrollToMatch}
        />
      )}

      {ev && (
        <>
          <div className="card">
            <h3>Team Entries — {EVENT_CODES[activeEvent]}</h3>
            {canEdit && (
              <div className="text-dim text-sm mb-2">
                After shuffle: use <strong>+ Add</strong> on a BYE row for a late entry, or <strong>Remove</strong> on a player row for a no-show.
              </div>
            )}
            <div className="team-grid">
              {ev.teams.map((team, idx) => (
                <div key={team.id + '_' + idx} className="team-row">
                  <label>{idx + 1}.</label>
                  {team.id === 'BYE' ? (
                    <>
                      <span style={{
                        fontSize: '0.68rem',
                        fontFamily: 'var(--font-mono)',
                        fontWeight: 700,
                        color: 'var(--text-dim)',
                        background: 'var(--bg-card-hover)',
                        padding: '2px 6px',
                        borderRadius: '4px',
                        flexShrink: 0,
                        letterSpacing: '0.5px'
                      }}>BYE</span>
                      <input
                        value={team.customDisplayName || ''}
                        disabled={!canEdit}
                        placeholder="add label (optional)…"
                        onChange={e => updateByeCustomName(activeEvent, idx, e.target.value)}
                        style={{ color: 'var(--teal)', fontStyle: 'italic' }}
                        maxLength={60}
                      />
                      {canEdit && (
                        <div className="team-row-actions">
                          <button
                            type="button"
                            className="team-row-btn add"
                            onClick={() => handleAddPlayer(idx)}
                            title="Add a late-entry player into this BYE slot"
                          >+ Add</button>
                        </div>
                      )}
                    </>
                  ) : (
                    <>
                      <input value={team.name} disabled={!canEdit}
                        onChange={e => updateTeamName(activeEvent, team.id, e.target.value)}
                      />
                      {canEdit && (
                        <div className="team-row-actions">
                          <button
                            type="button"
                            className="team-row-btn remove"
                            onClick={() => handleRemovePlayer(idx)}
                            title="Remove this player and replace with a BYE"
                          >Remove</button>
                        </div>
                      )}
                    </>
                  )}
                </div>
              ))}
            </div>
          </div>
          {ev.manualMode && (
            <div className="manualmode-banner">
              🔓 Manual mode is ON for {EVENT_CODES[activeEvent]}. Every name and score is editable. Drag a player by the ⠿ handle (or type a name) to move them between matches. Auto-advancement is paused until you turn manual mode off.
            </div>
          )}
          <div className="card draw-section">
            <h3>Main Draw</h3>
            <DrawView drawData={ev.mainDraw} eventData={ev} drawType="MD" readOnly={!canEdit} onSave={handleScoreSave} onEdit={canEdit ? handleScoreEdit : null} onCustomName={canEdit ? handleCustomNameUpdate : null} onSlotLabel={canEdit ? handleSlotLabelUpdate : null} onToggleMarshal={canEdit ? handleToggleMarshal : null} onSetSlotName={canEdit ? handleSetSlotName : null} onSlotDrop={canEdit ? handleSlotDrop : null} matchNumberMap={matchNumberMap} highlightedMatchId={highlightedMatchId} />
          </div>
          <div className="card draw-section">
            <h3>Consolation Draw</h3>
            <DrawView drawData={ev.consolationDraw} eventData={ev} drawType="CD" readOnly={!canEdit} onSave={handleScoreSave} onEdit={canEdit ? handleScoreEdit : null} onCustomName={canEdit ? handleCustomNameUpdate : null} onSlotLabel={canEdit ? handleSlotLabelUpdate : null} onToggleMarshal={canEdit ? handleToggleMarshal : null} onManualReset={canEdit ? handleManualReset : null} onSetSlotName={canEdit ? handleSetSlotName : null} onSlotDrop={canEdit ? handleSlotDrop : null} matchNumberMap={matchNumberMap} highlightedMatchId={highlightedMatchId} />
          </div>
          <div className="card draw-section">
            <h3>Waterfall Consolations</h3>
            <DrawView drawData={ev.waterfallConsolationDraw} eventData={ev} drawType="WCD" readOnly={!canEdit} onSave={handleScoreSave} onEdit={canEdit ? handleScoreEdit : null} onCustomName={canEdit ? handleCustomNameUpdate : null} onSlotLabel={canEdit ? handleSlotLabelUpdate : null} onToggleMarshal={canEdit ? handleToggleMarshal : null} onManualReset={canEdit ? handleManualReset : null} onSetSlotName={canEdit ? handleSetSlotName : null} onSlotDrop={canEdit ? handleSlotDrop : null} matchNumberMap={matchNumberMap} highlightedMatchId={highlightedMatchId} />
          </div>
        </>
      )}
      {showShare && meta && <ShareModal shareCode={meta.shareCode} onClose={() => setShowShare(false)} />}
      {showEditor && <AddEditorModal tournamentId={tournamentId} onClose={() => setShowEditor(false)} />}
    </div>
  );
}

function ReadOnlyLoader({ shareCode }) {
  const [tournamentId, setTournamentId] = useState(null);
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    (async () => {
      try {
        if (!auth.currentUser) {
          await auth.signInAnonymously();
        }
        const meta = await findTournamentByShareCode(shareCode);
        if (meta) { setTournamentId(meta.id); }
        else { setError('Tournament not found.'); }
      } catch (err) { setError('Error: ' + err.message); }
      setLoading(false);
    })();
  }, [shareCode]);

  if (loading) return <div className="loading-center"><span className="spinner"></span> Loading shared tournament...</div>;
  if (error) return (
    <div className="auth-wrapper">
      <div className="card auth-card text-center">
        <h1>🏸</h1>
        <p className="text-dim">{error}</p>
        <a href={window.location.pathname} className="btn btn-primary mt-4" style={{textDecoration:'none'}}>Go to App</a>
      </div>
    </div>
  );
  return <TournamentView tournamentId={tournamentId} user={null} readOnly={true} onBack={() => { window.location.href = window.location.pathname; }} />;
}

function App() {
  const [user, setUser] = useState(undefined);
  const [view, setView] = useState('list');
  const [selectedTournament, setSelectedTournament] = useState(null);

  const params = new URLSearchParams(window.location.search);
  const shareCode = params.get('share');

  useEffect(() => {
    if (!IS_CONFIGURED) { setUser(null); return; }
    const unsub = auth.onAuthStateChanged(u => {
      if (shareCode) return;
      setUser(u);
    });
    return unsub;
  }, []);

  if (!IS_CONFIGURED) return <SetupGuide />;
  if (shareCode) return <ReadOnlyLoader shareCode={shareCode} />;
  if (user === undefined) return <div className="loading-center"><span className="spinner"></span> Initializing...</div>;
  if (!user) return <AuthScreen />;

  const handleSelectTournament = (id, readOnly) => {
    setSelectedTournament({ id, readOnly });
    setView('tournament');
  };

  const handleBack = () => {
    setSelectedTournament(null);
    setView('list');
  };

  if (view === 'tournament' && selectedTournament) {
    return <TournamentView tournamentId={selectedTournament.id} user={user} readOnly={selectedTournament.readOnly} onBack={handleBack} />;
  }

  return <TournamentList user={user} onSelect={handleSelectTournament} onSignOut={() => auth.signOut()} />;
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
