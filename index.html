<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Badminton Tournament Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
/* ═══════════════════════════════════════════════════════════
   CSS — Badminton Tournament Manager
   ═══════════════════════════════════════════════════════════ */
:root {
  --bg: #f0f2f5;
  --bg-card: #ffffff;
  --bg-card-hover: #f7f8fa;
  --bg-input: #f5f6f8;
  --border: #d8dce5;
  --border-focus: #4a6cf7;
  --text: #3a3f51;
  --text-dim: #8890a4;
  --text-bright: #1a1e2c;
  --accent: #4a6cf7;
  --accent-hover: #3b5be6;
  --accent-dim: rgba(74,108,247,0.10);
  --green: #1a9d5a;
  --green-dim: rgba(26,157,90,0.10);
  --red: #dc3545;
  --red-dim: rgba(220,53,69,0.08);
  --orange: #d48a07;
  --orange-dim: rgba(212,138,7,0.10);
  --purple: #7c4dff;
  --purple-dim: rgba(124,77,255,0.10);
  --teal: #0ca6a0;
  --teal-dim: rgba(12,166,160,0.10);
  --yellow: #d4a017;
  --font-body: 'DM Sans', sans-serif;
  --font-mono: 'Space Mono', monospace;
  --radius: 8px;
  --radius-lg: 14px;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; }
body { font-family: var(--font-body); background: var(--bg); color: var(--text); min-height: 100vh; }
input, button, select, textarea { font-family: inherit; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #c4c9d4; border-radius: 3px; }
.app-shell { max-width: 1400px; margin: 0 auto; padding: 16px; }
.top-bar { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
.top-bar h1 { font-size: 1.25rem; font-weight: 700; color: var(--text-bright); display: flex; align-items: center; gap: 8px; }
.top-bar h1 span.icon { font-size: 1.4rem; }
.top-bar-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.user-badge { font-size: 0.8rem; color: var(--text-dim); background: var(--accent-dim); padding: 4px 10px; border-radius: 20px; }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer; font-size: 0.85rem; font-weight: 500; transition: all 0.15s; background: var(--bg-card); color: var(--text); }
.btn:hover { background: var(--bg-card-hover); border-color: var(--text-dim); }
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
.btn-danger { background: var(--red-dim); color: var(--red); border-color: transparent; }
.btn-danger:hover { background: var(--red); color: #fff; }
.btn-green { background: var(--green-dim); color: var(--green); border-color: transparent; }
.btn-green:hover { background: var(--green); color: #fff; }
.btn-orange { background: var(--orange-dim); color: var(--orange); border-color: transparent; }
.btn-orange:hover { background: var(--orange); color: #fff; }
.btn-purple { background: var(--purple-dim); color: var(--purple); border-color: transparent; }
.btn-purple:hover { background: var(--purple); color: #fff; }
.btn-sm { padding: 5px 10px; font-size: 0.78rem; }
.btn-block { width: 100%; justify-content: center; }
.card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; }
.card + .card { margin-top: 12px; }
.card h2 { font-size: 1.1rem; font-weight: 700; color: var(--text-bright); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.card h3 { font-size: 0.95rem; font-weight: 600; color: var(--text); margin-bottom: 10px; }
.input { width: 100%; padding: 9px 12px; background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text-bright); font-size: 0.9rem; transition: border-color 0.15s; }
.input:focus { outline: none; border-color: var(--border-focus); }
.input::placeholder { color: var(--text-dim); }
.form-group { margin-bottom: 12px; }
.form-group label { display: block; font-size: 0.8rem; color: var(--text-dim); margin-bottom: 4px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
.auth-wrapper { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
.auth-card { width: 100%; max-width: 400px; }
.auth-card h1 { text-align: center; margin-bottom: 6px; font-size: 1.6rem; color: var(--text-bright); }
.auth-card .subtitle { text-align: center; color: var(--text-dim); margin-bottom: 24px; font-size: 0.9rem; }
.auth-toggle { text-align: center; margin-top: 16px; font-size: 0.85rem; color: var(--text-dim); }
.auth-toggle a { color: var(--accent); cursor: pointer; text-decoration: none; }
.auth-toggle a:hover { text-decoration: underline; }
.auth-error { background: var(--red-dim); color: var(--red); padding: 8px 12px; border-radius: var(--radius); margin-bottom: 12px; font-size: 0.85rem; }
.tournament-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
.tournament-tile { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 18px; cursor: pointer; transition: all 0.15s; }
.tournament-tile:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: var(--shadow); }
.tournament-tile h3 { font-size: 1rem; color: var(--text-bright); margin-bottom: 6px; }
.tournament-tile .meta { font-size: 0.78rem; color: var(--text-dim); }
.create-tile { border-style: dashed; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; color: var(--text-dim); min-height: 120px; }
.create-tile:hover { color: var(--accent); border-color: var(--accent); }
.create-tile .plus { font-size: 2rem; line-height: 1; }
.event-tabs { display: flex; gap: 4px; overflow-x: auto; padding: 4px; background: var(--bg-input); border-radius: var(--radius); margin-bottom: 16px; }
.event-tab { padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-weight: 500; color: var(--text-dim); background: transparent; border: none; white-space: nowrap; transition: all 0.15s; }
.event-tab:hover { color: var(--text); }
.event-tab.active { background: var(--accent); color: #fff; }
.team-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 8px; }
.team-row { display: flex; align-items: center; gap: 8px; padding: 6px 10px; background: var(--bg-input); border-radius: var(--radius); border: 1px solid var(--border); }
.team-row label { font-size: 0.75rem; color: var(--text-dim); min-width: 56px; font-family: var(--font-mono); }
.team-row input { flex: 1; background: transparent; border: none; color: var(--text-bright); font-size: 0.85rem; padding: 4px 0; }
.team-row input:focus { outline: none; }
.draw-section { margin-top: 16px; }
.draw-section h3 { font-size: 1rem; font-weight: 600; color: var(--accent); margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
.draw-container { display: flex; overflow-x: auto; padding: 12px 4px 12px 0; gap: 4px; min-height: 300px; align-items: stretch; }
.round-col { display: grid; grid-template-rows: auto repeat(var(--num-rows, 16), 1fr); min-width: 260px; padding: 0 6px; border-right: 1px dashed var(--border); }
.round-col:last-child { border-right: none; }
.round-header { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); font-family: var(--font-mono); text-align: center; padding: 4px 0 8px; }
.round-slot { grid-row: span var(--row-span, 1); display: flex; align-items: center; justify-content: center; padding: 2px 0; min-height: 0; }
.round-slot > .match-card { width: 100%; margin: 0; }
.match-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px; margin: 6px 0; transition: border-color 0.15s; }
.match-card:hover { border-color: var(--text-dim); }
.match-card.complete { border-color: var(--green); border-left: 3px solid var(--green); }
.match-card.bye { border-color: var(--text-dim); opacity: 0.6; }
.match-label { font-size: 0.68rem; color: var(--text-dim); font-family: var(--font-mono); margin-bottom: 6px; text-align: right; }
.match-team { display: flex; align-items: center; gap: 6px; padding: 5px 0; border-bottom: 1px solid var(--border); }
.match-team:last-of-type { border-bottom: none; }
.match-team-name { flex: 1; font-size: 0.85rem; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
.match-team.winner .match-team-name { color: var(--green); font-weight: 700; }
.match-team.loser .match-team-name { color: var(--text-dim); text-decoration: line-through; }
.match-scores { display: flex; gap: 3px; flex-shrink: 0; }
.score-box { width: 48px; padding: 3px; text-align: center; background: var(--bg-input); border: 1px solid var(--border); border-radius: 4px; color: var(--text-bright); font-size: 0.82rem; font-family: var(--font-mono); }
.score-box:focus { border-color: var(--accent); outline: none; }
.score-box:disabled { opacity: 0.5; }
.match-save-btn { width: 100%; margin-top: 8px; padding: 6px; background: var(--green-dim); color: var(--green); border: none; border-radius: 6px; cursor: pointer; font-size: 0.8rem; font-weight: 600; transition: all 0.15s; }
.match-save-btn:hover { background: var(--green); color: #fff; }
.match-bye-text { text-align: center; font-size: 0.8rem; color: var(--text-dim); font-style: italic; padding: 4px 0; }
.match-winner-text { text-align: center; font-size: 0.78rem; color: var(--green); font-weight: 600; margin-top: 4px; }
.controls-bar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; padding: 12px 16px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); margin-bottom: 16px; }
.controls-bar .sep { width: 1px; background: var(--border); margin: 0 4px; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
.modal-content { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 24px; max-width: 500px; width: 100%; max-height: 90vh; overflow-y: auto; }
.modal-content h2 { margin-bottom: 16px; }
.modal-close { position: absolute; top: 12px; right: 16px; background: none; border: none; color: var(--text-dim); font-size: 1.4rem; cursor: pointer; }
.qr-container { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 20px; }
.qr-container canvas { border-radius: var(--radius); }
.share-url { font-family: var(--font-mono); font-size: 0.78rem; color: var(--text-dim); word-break: break-all; text-align: center; background: var(--bg-input); padding: 8px 12px; border-radius: var(--radius); width: 100%; }
.readonly-banner { background: var(--orange-dim); color: var(--orange); padding: 10px 16px; border-radius: var(--radius); margin-bottom: 12px; text-align: center; font-size: 0.88rem; font-weight: 500; }
.config-box { background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin: 20px auto; max-width: 600px; }
.config-box pre { background: var(--bg-card); padding: 12px; border-radius: var(--radius); font-size: 0.78rem; overflow-x: auto; color: var(--accent); font-family: var(--font-mono); line-height: 1.6; }
.config-box p { color: var(--text-dim); font-size: 0.88rem; line-height: 1.6; margin-bottom: 10px; }
.config-box h2 { color: var(--text-bright); margin-bottom: 12px; }
.spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-center { display: flex; align-items: center; justify-content: center; padding: 60px; gap: 12px; color: var(--text-dim); }
.match-number-badge {
  display: inline-block;
  font-size: 0.65rem;
  font-weight: 700;
  font-family: var(--font-mono);
  color: var(--accent);
  background: var(--accent-dim);
  padding: 2px 7px;
  border-radius: 10px;
  letter-spacing: 0.3px;
}
.match-label-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 6px;
  margin-bottom: 6px;
}
.match-label-row .label-left {
  display: flex;
  align-items: center;
  gap: 6px;
  min-width: 0;
  flex: 1;
}
.match-marshal-toggle {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  font-family: var(--font-mono);
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.4px;
  padding: 2px 7px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--bg-input);
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.15s;
  user-select: none;
  flex-shrink: 0;
  line-height: 1.2;
}
.match-marshal-toggle:hover {
  border-color: var(--accent);
  color: var(--text);
}
.match-marshal-toggle.on {
  background: var(--green-dim);
  color: var(--green);
  border-color: var(--green);
}
.match-marshal-toggle.on:hover {
  background: var(--green);
  color: #fff;
}
.player-search-bar {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 12px 16px;
  margin-bottom: 16px;
  position: relative;
}
.player-search-bar .search-input-row {
  display: flex;
  align-items: center;
  gap: 10px;
}
.player-search-bar .search-icon {
  font-size: 1.1rem;
  color: var(--text-dim);
  flex-shrink: 0;
}
.player-search-bar input {
  flex: 1;
  padding: 9px 14px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-bright);
  font-size: 0.92rem;
  transition: border-color 0.15s;
}
.player-search-bar input:focus {
  outline: none;
  border-color: var(--border-focus);
}
.player-search-bar input::placeholder {
  color: var(--text-dim);
}
.player-search-bar .search-clear {
  background: none;
  border: none;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 1.2rem;
  padding: 4px 8px;
  border-radius: 50%;
  transition: all 0.15s;
}
.player-search-bar .search-clear:hover {
  background: var(--bg-input);
  color: var(--text);
}
.search-results {
  margin-top: 12px;
  border-top: 1px solid var(--border);
  padding-top: 12px;
}
.search-results-header {
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 10px;
}
.search-results-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.search-result-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  transition: all 0.15s;
}
.search-result-item:hover {
  border-color: var(--accent);
  transform: translateX(4px);
}
.search-result-item.next-match {
  border-color: var(--accent);
  background: var(--accent-dim);
  border-left: 3px solid var(--accent);
}
.search-result-item.completed-match {
  opacity: 0.6;
}
.search-result-match-num {
  font-family: var(--font-mono);
  font-size: 0.78rem;
  font-weight: 700;
  color: var(--accent);
  min-width: 70px;
}
.search-result-detail {
  flex: 1;
  min-width: 0;
}
.search-result-detail .matchup {
  font-size: 0.85rem;
  color: var(--text-bright);
  font-weight: 500;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.search-result-detail .draw-info {
  font-size: 0.72rem;
  color: var(--text-dim);
  font-family: var(--font-mono);
  margin-top: 2px;
}
.search-result-status {
  font-size: 0.72rem;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 10px;
  white-space: nowrap;
  flex-shrink: 0;
}
.search-result-status.upcoming {
  background: var(--accent-dim);
  color: var(--accent);
}
.search-result-status.waiting {
  background: var(--orange-dim);
  color: var(--orange);
}
.search-result-status.won {
  background: var(--green-dim);
  color: var(--green);
}
.search-result-status.lost {
  background: var(--red-dim);
  color: var(--red);
}
.search-result-status.next {
  background: var(--accent);
  color: #fff;
}
.search-no-results {
  text-align: center;
  color: var(--text-dim);
  font-size: 0.85rem;
  padding: 12px;
}
.match-card.highlighted {
  border-color: var(--accent);
  box-shadow: 0 0 0 2px var(--accent-dim), var(--shadow);
  animation: highlightPulse 1.5s ease-out;
}
@keyframes highlightPulse {
  0% { box-shadow: 0 0 0 4px rgba(74,108,247,0.3), var(--shadow); }
  100% { box-shadow: 0 0 0 2px var(--accent-dim), var(--shadow); }
}
.match-edit-btn {
  width: 100%;
  margin-top: 6px;
  padding: 5px;
  background: var(--orange-dim);
  color: var(--orange);
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.75rem;
  font-weight: 600;
  transition: all 0.15s;
}
.match-edit-btn:hover {
  background: var(--orange);
  color: #fff;
}
.match-manual-btn {
  width: 100%;
  margin-top: 6px;
  padding: 5px;
  background: var(--purple-dim);
  color: var(--purple);
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.72rem;
  font-weight: 600;
  transition: all 0.15s;
}
.match-manual-btn:hover {
  background: var(--purple);
  color: #fff;
}
.match-manual-tag {
  font-size: 0.66rem;
  text-align: center;
  color: var(--purple);
  font-family: var(--font-mono);
  margin-top: 4px;
  letter-spacing: 0.4px;
}
.manualmode-banner {
  background: var(--purple-dim);
  color: var(--purple);
  padding: 10px 16px;
  border-radius: var(--radius);
  margin: 8px 0 12px;
  font-size: 0.85rem;
  font-weight: 500;
  border: 1px solid var(--purple);
  line-height: 1.4;
}
.match-team.manual {
  background: rgba(124,77,255,0.04);
  border-radius: 4px;
}
.match-team.manual:hover {
  background: rgba(124,77,255,0.08);
}
.manual-slot-row {
  display: flex;
  align-items: center;
  gap: 4px;
  width: 100%;
  min-width: 0;
}
.manual-slot-drag-handle {
  font-size: 1rem;
  color: var(--text-dim);
  cursor: grab;
  user-select: none;
  padding: 0 2px;
  flex-shrink: 0;
  line-height: 1;
}
.manual-slot-drag-handle:active { cursor: grabbing; }
.manual-slot-drag-handle.disabled {
  color: var(--border);
  cursor: not-allowed;
}
.manual-slot-input {
  flex: 1;
  min-width: 0;
  padding: 4px 8px;
  font-size: 0.85rem;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text-bright);
}
.manual-slot-input:focus {
  outline: none;
  border-color: var(--purple);
}
.team-row .team-row-actions {
  display: flex;
  gap: 4px;
  flex-shrink: 0;
}
.team-row-btn {
  font-size: 0.7rem;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s;
}
.team-row-btn.add {
  background: var(--green-dim);
  color: var(--green);
}
.team-row-btn.add:hover {
  background: var(--green);
  color: #fff;
}
.team-row-btn.remove {
  background: var(--red-dim);
  color: var(--red);
}
.team-row-btn.remove:hover {
  background: var(--red);
  color: #fff;
}
.match-cascade-warning {
  font-size: 0.7rem;
  color: var(--red);
  text-align: center;
  margin-top: 4px;

<script type="text/babel">
/* ═══════════════════════════════════════════════════════════

const FIREBASE_CONFIG = {
  apiKey: "AIzaSyDmPzyNjDT37ZGuEPZjXzROpB0WRGpteIM",

let fb = null, db = null, auth = null;
if (IS_CONFIGURED) {
  fb = firebase.initializeApp(FIREBASE_CONFIG);
  db = firebase.firestore();
  auth = firebase.auth();
}

const EVENT_CODES = {
  BS: "Boy's Singles", GS: "Girl's Singles",
  BD: "Boy's Doubles", GD: "Girl's Doubles",
  XD: "Mixed Doubles"
};
const NUM_SCHOOLS = 16;
const TEAMS_PER_SCHOOL = 2;
const TOTAL_TEAMS = NUM_SCHOOLS * TEAMS_PER_SCHOOL;

function sanitizeScoreArray(arr) {
  if (!Array.isArray(arr)) return [];
  return arr.map(v => (v === undefined ? null : v));
}

function serializeDrawForFirestore(draw) {
  if (!draw || !draw.rounds) return draw;
  const serialized = { ...draw };
  if (Array.isArray(serialized.rounds)) {
    const roundsObj = {};
    serialized.rounds.forEach((round, i) => {
      roundsObj[String(i)] = round.map(match => ({
        ...match,
        score1: sanitizeScoreArray(match.score1),
        score2: sanitizeScoreArray(match.score2)
      }));
    });
    serialized.rounds = roundsObj;
  }
  return serialized;
}

function deserializeDrawFromFirestore(draw) {
  if (!draw || !draw.rounds) return draw;
  const deserialized = { ...draw };
  if (!Array.isArray(deserialized.rounds) && typeof deserialized.rounds === 'object') {
    const keys = Object.keys(deserialized.rounds)
      .map(k => parseInt(k, 10))
      .filter(k => !isNaN(k))
      .sort((a, b) => a - b);
    deserialized.rounds = keys.map(k => {
      const round = deserialized.rounds[String(k)];
      return Array.isArray(round) ? round.map(m => ({
        ...m,
        score1: Array.isArray(m.score1) ? m.score1 : [],
        score2: Array.isArray(m.score2) ? m.score2 : []
      })) : [];
    });
  }
  return deserialized;
}

function serializeEventForFirestore(eventData) {
  const data = JSON.parse(JSON.stringify(eventData));
  data.mainDraw = serializeDrawForFirestore(data.mainDraw);
  data.consolationDraw = serializeDrawForFirestore(data.consolationDraw);
  data.waterfallConsolationDraw = serializeDrawForFirestore(data.waterfallConsolationDraw);
  return data;
}

function deserializeEventFromFirestore(eventData) {
  if (!eventData) return eventData;
  const data = JSON.parse(JSON.stringify(eventData));
  data.mainDraw = deserializeDrawFromFirestore(data.mainDraw);
  data.consolationDraw = deserializeDrawFromFirestore(data.consolationDraw);
  data.waterfallConsolationDraw = deserializeDrawFromFirestore(data.waterfallConsolationDraw);
  return data;
}

function createInitialTeams(eventId) {
  const teams = [];
  for (let i = 0; i < NUM_SCHOOLS; i++) {
    for (let j = 0; j < TEAMS_PER_SCHOOL; j++) {
      teams.push({
        id: `${eventId}_s${i+1}_t${j+1}`,
        name: `School ${i+1} - Team ${j+1}`,
        customDisplayName: '',
        originalPlayerSlot: teams.length,
        mainDrawLosses: 0,
        consolationLosses: 0
      });
    }
  }
  return teams;
}

function makeMatch(id, round, matchInRound, team1Source, team2Source, opts = {}) {
  return {
    id, round, matchInRound,
    customLabel: opts.customLabel || '',
    team1Id: null, team2Id: null,
    team1Source: team1Source || null,
    team2Source: team2Source || null,
    team1Label: '', team2Label: '',
    score1: [], score2: [],
    winnerId: null, loserId: null,
    isBye: false, isComplete: false,
    isSF: !!opts.isSF, isFinal: !!opts.isFinal,
    isOverallChampionship: !!opts.isOverallChampionship,
    isSecondPlacePlayoff: !!opts.isSecondPlacePlayoff,
    marshalled: false,
    loserFeedsToNextBracketMatchId: opts.loserFeed || null,
    loserFeedsToNextBracketSlotNumber: opts.loserSlot || null,
    nextBracketType: opts.nextBracketType || null
  };
}

function generateMainDraw() {
  const rounds = [];
  let r = [];
  for (let i = 0; i < 16; i++) {
    r.push(makeMatch(`M1.${i+1}`, 1, i+1,
      { type: 'seed', slot: i*2 }, { type: 'seed', slot: i*2+1 },
      { customLabel: `MD R1.${i+1}`, loserFeed: `CD1.${Math.floor(i/2)+1}`, loserSlot: (i%2===0)?1:2, nextBracketType: 'CD' }));
  }
  rounds.push(r);
  r = [];
  // Natural pairing: M2.j loser feeds CD2.j (slot 2). Rematches against MD
  // pairings are accepted (the previous rematch breaker introduced placement
  // instability and has been removed).
  for (let i = 0; i < 8; i++) {
    r.push(makeMatch(`M2.${i+1}`, 2, i+1,
      { type: 'winner', matchId: `M1.${i*2+1}` }, { type: 'winner', matchId: `M1.${i*2+2}` },
      { customLabel: `MD R2.${i+1}`, loserFeed: `CD2.${i+1}`, loserSlot: 2, nextBracketType: 'CD' }));
  }
  rounds.push(r);
  r = [];
  for (let i = 0; i < 4; i++) {
    r.push(makeMatch(`M3.${i+1}`, 3, i+1,
      { type: 'winner', matchId: `M2.${i*2+1}` }, { type: 'winner', matchId: `M2.${i*2+2}` },
      { customLabel: `MD QF.${i+1}`, loserFeed: `CD4.${i+1}`, loserSlot: 2, nextBracketType: 'CD' }));
  }
  rounds.push(r);
  r = [];
  for (let i = 0; i < 2; i++) {
    r.push(makeMatch(`M4.${i+1}`, 4, i+1,
      { type: 'winner', matchId: `M3.${i*2+1}` }, { type: 'winner', matchId: `M3.${i*2+2}` },
      { customLabel: `MD SF.${i+1}`, isSF: true, loserFeed: `CD6.${i+1}`, loserSlot: 2, nextBracketType: 'CD' }));
  }
  rounds.push(r);
  r = [makeMatch('M5.1', 5, 1,
    { type: 'winner', matchId: 'M4.1' }, { type: 'winner', matchId: 'M4.2' },
    { customLabel: 'MD Final', isFinal: true })];
  rounds.push(r);
  return { rounds };
}

function generateConsolationDraw() {
  const rounds = [];
  let r = [];
  for (let i = 0; i < 8; i++) {
    r.push(makeMatch(`CD1.${i+1}`, 1, i+1,
      { type: 'loser', matchId: `M1.${i*2+1}` }, { type: 'loser', matchId: `M1.${i*2+2}` },
      { customLabel: `CD R1.${i+1}` }));
  }
  rounds.push(r);
  r = [];
  for (let i = 0; i < 8; i++) {
    r.push(makeMatch(`CD2.${i+1}`, 2, i+1,
      { type: 'winner', matchId: `CD1.${i+1}` }, { type: 'loser', matchId: `M2.${i+1}` },
      { customLabel: `CD R2.${i+1}` }));
  }
  rounds.push(r);
  r = [];
  for (let i = 0; i < 4; i++) {
    r.push(makeMatch(`CD3.${i+1}`, 3, i+1,
      { type: 'winner', matchId: `CD2.${i*2+1}` }, { type: 'winner', matchId: `CD2.${i*2+2}` },
      { customLabel: `CD R3.${i+1} (Playdown)` }));
  }
  rounds.push(r);
  r = [];
  for (let i = 0; i < 4; i++) {
    r.push(makeMatch(`CD4.${i+1}`, 4, i+1,
      { type: 'winner', matchId: `CD3.${i+1}` }, { type: 'loser', matchId: `M3.${i+1}` },
      { customLabel: `CD R4.${i+1} (vs QF Losing Teams)` }));
  }
  rounds.push(r);
  r = [];
  for (let i = 0; i < 2; i++) {
    r.push(makeMatch(`CD5.${i+1}`, 5, i+1,
      { type: 'winner', matchId: `CD4.${i*2+1}` }, { type: 'winner', matchId: `CD4.${i*2+2}` },
      { customLabel: `CD R5.${i+1} (Playdown)` }));
  }
  rounds.push(r);
  r = [];
  for (let i = 0; i < 2; i++) {
    r.push(makeMatch(`CD6.${i+1}`, 6, i+1,
      { type: 'winner', matchId: `CD5.${i+1}` }, { type: 'loser', matchId: `M4.${i+1}` },
      { customLabel: `CD SF.${i+1}` }));
  }
  rounds.push(r);
  r = [makeMatch('CD7.1', 7, 1,
    { type: 'winner', matchId: 'CD6.1' }, { type: 'winner', matchId: 'CD6.2' },
    { customLabel: 'CD Final', isFinal: true })];
  rounds.push(r);
  r = [makeMatch('CD8.1', 8, 1,
    { type: 'loser', matchId: 'M5.1' }, { type: 'winner', matchId: 'CD7.1' },
    { customLabel: '2nd Place Playoff', isSecondPlacePlayoff: true })];
  rounds.push(r);
  return { rounds };
}

function generateWaterfallDraw() {
  const rounds = [];
  let r = [];
  for (let i = 0; i < 4; i++) {
    r.push(makeMatch(`WCD1.${i+1}`, 1, i+1,
      null, null,
      { customLabel: `WCD R1.${i+1}` }));
  }
  rounds.push(r);
  r = [];
  for (let i = 0; i < 2; i++) {
    r.push(makeMatch(`WCD2.${i+1}`, 2, i+1,
      { type: 'winner', matchId: `WCD1.${i*2+1}` }, { type: 'winner', matchId: `WCD1.${i*2+2}` },
      { customLabel: `WCD SF.${i+1}` }));
  }
  rounds.push(r);
  r = [makeMatch('WCD3.1', 3, 1,
    { type: 'winner', matchId: 'WCD2.1' }, { type: 'winner', matchId: 'WCD2.2' },
    { customLabel: 'WCD Final' })];
  rounds.push(r);
  return { rounds };
}

function createEventObject(eventId) {
  return {
    id: eventId, name: EVENT_CODES[eventId],
    teams: createInitialTeams(eventId),
    adhocTeams: [],
    mainDraw: generateMainDraw(),
    consolationDraw: generateConsolationDraw(),
    waterfallConsolationDraw: generateWaterfallDraw(),
    setupComplete: false,
    manualMode: false
  };
}

function createFullTournamentData() {
  const data = {};
  Object.keys(EVENT_CODES).forEach(eid => { data[eid] = createEventObject(eid); });
  return data;
}

function checkGameWinner(s1, s2) {
  if (s1 === null || s2 === null || s1 === undefined || s2 === undefined || String(s1).trim() === '' || String(s2).trim() === '') return null;
  const p1 = parseInt(s1), p2 = parseInt(s2);
  if (isNaN(p1) || isNaN(p2)) return null;
  if (p1 === 30 && p1 > p2) return 1;
  if (p2 === 30 && p2 > p1) return 2;
  if (p1 < 30 && p2 < 30) {
    if (p1 >= 21 && p1 >= p2 + 2) return 1;
    if (p2 >= 21 && p2 >= p1 + 2) return 2;
  }
  return null;
}

function isBo3(match, drawType) {
  return (drawType === 'MD' && (match.isSF || match.isFinal || match.isOverallChampionship)) ||
         (drawType === 'CD' && (match.isFinal || match.isSecondPlacePlayoff));
}

function determineMatchWinner(match, drawType) {
  const bo3 = isBo3(match, drawType);
  const numGames = bo3 ? 3 : 1;
  let w1 = 0, w2 = 0;
  for (let g = 0; g < numGames; g++) {
    if (bo3 && (w1 >= 2 || w2 >= 2)) break;
    const gw = checkGameWinner(match.score1[g], match.score2[g]);
    if (gw === 1) w1++; else if (gw === 2) w2++;
    else {
      if (match.score1[g] !== null && match.score1[g] !== undefined &&
          match.score2[g] !== null && match.score2[g] !== undefined) return { valid: false };
      if (bo3 && (w1 >= 2 || w2 >= 2)) break;
    }
  }
  if (!bo3) {
    if (w1 === 1) return { valid: true, winnerId: match.team1Id, loserId: match.team2Id };
    if (w2 === 1) return { valid: true, winnerId: match.team2Id, loserId: match.team1Id };
    return { valid: false };
  } else {
    if (w1 >= 2) return { valid: true, winnerId: match.team1Id, loserId: match.team2Id };
    if (w2 >= 2) return { valid: true, winnerId: match.team2Id, loserId: match.team1Id };
    return { valid: false };
  }
}

function findMatch(eventData, drawType, matchId) {
  let draw;
  if (drawType === 'MD') draw = eventData.mainDraw;
  else if (drawType === 'CD') draw = eventData.consolationDraw;
  else if (drawType === 'WCD') draw = eventData.waterfallConsolationDraw;
  if (!draw || !draw.rounds) return null;
  for (const round of draw.rounds) {
    const m = round.find(x => x.id === matchId);
    if (m) return m;
  }
  return null;
}

// Look up a team by id across both the seeded teams array and any
// adhoc teams introduced by Feature 2 (manual populate). Returns null
// for BYE/null/missing ids so callers can detect "no real team".
function findTeamById(eventData, id) {
  if (!id || id === 'BYE' || id === 'TBD') return null;
  if (eventData.teams) {
    const t = eventData.teams.find(x => x.id === id);
    if (t) return t;
  }
  if (eventData.adhocTeams) {
    const t = eventData.adhocTeams.find(x => x.id === id);
    if (t) return t;
  }
  return null;
}

function whichDrawForMatchId(eventData, matchId) {
  for (const [key, type] of [['mainDraw','MD'],['consolationDraw','CD'],['waterfallConsolationDraw','WCD']]) {
    const draw = eventData[key];
    if (!draw || !draw.rounds) continue;
    for (const round of draw.rounds) {
      if (round.find(m => m.id === matchId)) return type;
    }
  }
  return null;
}

function findMatchAcrossDraws(eventData, matchId) {
  if (matchId.startsWith('M')) return findMatch(eventData, 'MD', matchId);
  if (matchId.startsWith('WCD')) return findMatch(eventData, 'WCD', matchId);
  if (matchId.startsWith('CD')) return findMatch(eventData, 'CD', matchId);
  return null;
}

function getPlayerIdFromSource(eventData, source) {
  if (!source) return null;
  if (source.type === 'seed') return eventData.teams[source.slot] ? eventData.teams[source.slot].id : null;
  if (source.type === 'winner') {
    const sm = findMatchAcrossDraws(eventData, source.matchId);
    return (sm && sm.isComplete) ? sm.winnerId : null;
  }
  if (source.type === 'loser') {
    const sm = findMatchAcrossDraws(eventData, source.matchId);
    if (sm && sm.isComplete) {
      if (sm.isBye) {
        if (sm.team1Id === 'BYE' || sm.team2Id === 'BYE' || sm.winnerId === 'BYE') return 'BYE';
      }
      return sm.loserId;
    }
    return null;
  }
  return null;
}

function populateDraw(eventData, draw) {
  if (!draw || !draw.rounds) return;
  // Manual event mode pauses ALL automatic placement and propagation.
  // Existing winnerIds / teamIds are preserved as-is so the editor can
  // reshuffle by drag-drop or by typing without anything snapping back.
  if (eventData.manualMode) return;
  draw.rounds.forEach(round => {
    round.forEach(match => {
      if (match.isComplete && !match.isBye) return;
      // Manually populated matches (Feature 2) ignore source-based filling
      // so the editor's custom team names persist. Score/winner propagation
      // still works normally below.
      const skipAutoFill = !!match.manualOverride;
      if (!skipAutoFill && (!match.team1Id || match.team1Id === 'TBD')) {
        const p = getPlayerIdFromSource(eventData, match.team1Source);
        if (p) match.team1Id = p;
      }
      if (!skipAutoFill && (!match.team2Id || match.team2Id === 'TBD')) {
        const p = getPlayerIdFromSource(eventData, match.team2Source);
        if (p) match.team2Id = p;
      }
      if (!match.isComplete) {
        let byeWinner = null;
        if (match.team1Id === 'BYE' && match.team2Id && match.team2Id !== 'BYE' && match.team2Id !== 'TBD') byeWinner = match.team2Id;
        else if (match.team2Id === 'BYE' && match.team1Id && match.team1Id !== 'BYE' && match.team1Id !== 'TBD') byeWinner = match.team1Id;
        else if (match.team1Id === 'BYE' && match.team2Id === 'BYE') byeWinner = 'BYE';
        if (byeWinner) {
          match.winnerId = byeWinner;
          match.loserId = (byeWinner === match.team1Id) ? match.team2Id : match.team1Id;
          match.isComplete = true; match.isBye = true;
          match.score1 = []; match.score2 = [];
        }
      }
      if (match.isComplete && match.loserId && match.loserFeedsToNextBracketMatchId && match.nextBracketType) {
        const target = findMatch(eventData, match.nextBracketType, match.loserFeedsToNextBracketMatchId);
        if (target && !target.isComplete) {
          if (match.loserFeedsToNextBracketSlotNumber === 1 && (!target.team1Id || target.team1Id === 'TBD')) target.team1Id = match.loserId;
          else if (match.loserFeedsToNextBracketSlotNumber === 2 && (!target.team2Id || target.team2Id === 'TBD')) target.team2Id = match.loserId;
          if (!target.isComplete) {
            let tw = null;
            if (target.team1Id === 'BYE' && target.team2Id && target.team2Id !== 'BYE' && target.team2Id !== 'TBD') tw = target.team2Id;
            else if (target.team2Id === 'BYE' && target.team1Id && target.team1Id !== 'BYE' && target.team1Id !== 'TBD') tw = target.team1Id;
            if (tw) { target.winnerId = tw; target.loserId = (tw === target.team1Id) ? target.team2Id : target.team1Id; target.isComplete = true; target.isBye = true; target.score1 = []; target.score2 = []; }
          }
        }
      }
    });
  });
}

/* ═══════════════════════════════════════════════════════════
   CONSOLATION R1 placements are determined entirely by the natural
   loser-feeds from MD R1 (M1.j loser → CD1.⌈j/2⌉ slot ((j-1)%2+1)).
   Once an MD R1 match completes, its loser lands in a fixed CD R1
   slot and never moves. This was previously a redistribution that
   sorted real teams into earlier matches; that introduced a "moving
   target" where placements shifted as later matches completed and
   broke cascade-reset (a real team placed via redistribution could
   not be traced back to its source MD R1 match). We now rely on the
   natural feed for stability.
   ═══════════════════════════════════════════════════════════ */

/* ═══════════════════════════════════════════════════════════
   WATERFALL CONSOLATION — DETERMINISTIC POPULATION
   Eligibility:
     A team enters WCD only if they lost their FIRST main-draw match
     AND their FIRST consolation match. Operationally, a team has
     "lost their first match" in a draw when they have no non-BYE
     wins in that draw. So a team qualifies when:
       - no non-BYE wins in MD, AND
       - no non-BYE wins in CD, AND
       - has a real loss in CD.
   BYEs:
     BYEs only fill empty WCD R1 slots once no more potentially
     eligible teams remain (i.e., every team has either entered or
     disqualified themselves by winning a CD/MD match).
   Placement is deterministic (sorted by team ID) so all users
   and refreshes see the same draw.
   ═══════════════════════════════════════════════════════════ */
function populateWaterfallDynamic(eventData) {
  if (eventData.manualMode) return;
  const wcd = eventData.waterfallConsolationDraw;
  if (!wcd || !wcd.rounds || !wcd.rounds[0]) return;
  const wcdR1 = wcd.rounds[0];
  const numMatches = wcdR1.length;  // 4
  const totalSlots = numMatches * 2; // 8

  const md = eventData.mainDraw;
  const cd = eventData.consolationDraw;
  if (!md || !md.rounds || !cd || !cd.rounds) return;

  const hasRealWin = (draw, tid) => {
    for (const round of draw.rounds) {
      for (const m of round) {
        if (m.isComplete && !m.isBye && m.winnerId === tid) return true;
      }
    }
    return false;
  };
  const hasRealLoss = (draw, tid) => {
    for (const round of draw.rounds) {
      for (const m of round) {
        if (m.isComplete && !m.isBye && m.loserId === tid) return true;
      }
    }
    return false;
  };
  // A team is "alive" — could still produce a real CD loss — if they're
  // sitting in any pending MD or CD match. Once they have no pending
  // matches and no real CD loss, their fate is sealed (e.g., advanced
  // through CD via BYEs only); they're no longer potentially eligible.
  const isAlive = (tid) => {
    for (const draw of [md, cd]) {
      for (const round of draw.rounds) {
        for (const m of round) {
          if (!m.isComplete && (m.team1Id === tid || m.team2Id === tid)) return true;
        }
      }
    }
    return false;
  };

  // Adhoc teams (manually populated in CD/WCD) are exempt from
  // eligibility checks — they're not in the original 32-slot draw
  // and shouldn't be cleared as "ineligible".
  const adhocSet = new Set((eventData.adhocTeams || []).map(t => t.id));

  const eligibleTeams = [];
  let potentialFuture = 0;
  for (const team of eventData.teams) {
    if (!team || !team.id || team.id === 'BYE') continue;
    const tid = team.id;
    if (hasRealWin(md, tid) || hasRealWin(cd, tid)) continue; // disqualified
    if (hasRealLoss(cd, tid)) {
      eligibleTeams.push(tid);
    } else if (isAlive(tid)) {
      potentialFuture++;
    }
    // else: decided but not eligible (e.g., advanced via BYEs); disqualified for WCD purposes
  }
  const eligibleSet = new Set(eligibleTeams);

  /* For each WCD R1 match: skip already-played matches entirely (their teams
     are locked). For pending or BYE-completed matches, clear non-eligible/
     BYE/TBD slots and refill. Adhoc/manually-placed teams are preserved. */
  let anyChanged = false;
  wcdR1.forEach(m => {
    if (m.manualOverride) return;       // manually placed — leave alone
    if (m.isComplete && !m.isBye) return; // played match — locked
    let cleared = false;
    const clearable = (tid) =>
      tid === 'BYE' || tid === 'TBD' ||
      (tid && !eligibleSet.has(tid) && !adhocSet.has(tid));
    if (clearable(m.team1Id)) { m.team1Id = null; cleared = true; }
    if (clearable(m.team2Id)) { m.team2Id = null; cleared = true; }
    if (cleared || m.isBye) {
      m.score1 = []; m.score2 = [];
      m.winnerId = null; m.loserId = null;
      m.isComplete = false; m.isBye = false;
      anyChanged = true;
    }
  });

  const placed = new Set();
  wcdR1.forEach(m => {
    if (m.team1Id && m.team1Id !== 'BYE' && m.team1Id !== 'TBD') placed.add(m.team1Id);
    if (m.team2Id && m.team2Id !== 'BYE' && m.team2Id !== 'TBD') placed.add(m.team2Id);
  });

  const toPlace = eligibleTeams.filter(t => !placed.has(t)).sort();

  const slotOrder = wcdSlotOrder(eventData.id || '', totalSlots);
  const slotIdToCoords = (idx) => ({ mi: idx >>> 1, slot: (idx & 1) + 1 });
  const slotAvailable = (idx) => {
    const { mi, slot } = slotIdToCoords(idx);
    const m = wcdR1[mi];
    if (m.manualOverride) return false;
    if (m.isComplete && !m.isBye) return false;
    return slot === 1 ? !m.team1Id : !m.team2Id;
  };
  const setSlot = (idx, tid) => {
    const { mi, slot } = slotIdToCoords(idx);
    if (slot === 1) wcdR1[mi].team1Id = tid;
    else wcdR1[mi].team2Id = tid;
  };

  let ti = 0;
  for (const idx of slotOrder) {
    if (ti >= toPlace.length) break;
    if (!slotAvailable(idx)) continue;
    setSlot(idx, toPlace[ti++]);
    anyChanged = true;
  }

  // Fill remaining empties with BYE once no more potential eligibles can arrive.
  // This ensures TBDs in WCD eventually resolve to BYEs after CD plays out.
  if (potentialFuture === 0) {
    for (const idx of slotOrder) {
      if (slotAvailable(idx)) {
        setSlot(idx, 'BYE');
        anyChanged = true;
      }
    }
  }

  if (anyChanged) {
    for (let ri = 1; ri < wcd.rounds.length; ri++) {
      wcd.rounds[ri].forEach(m => {
        if (m.manualOverride) return;
        if (m.isBye) {
          m.team1Id = null; m.team2Id = null;
          m.winnerId = null; m.loserId = null;
          m.isComplete = false; m.isBye = false;
        } else if (!m.isComplete) {
          m.team1Id = null; m.team2Id = null;
        }
      });
    }
  }
}

/* Rematches in CD R2+ from MD pairings are acceptable — players know
   they may face the same opponent again. The previous rematch-breaker
   would swap team1 pointers across CD/WCD rounds; that mutation
   destabilized stored placements and conflicted with the "once-placed,
   never-moves" rule. The breaker has been removed. */

function populateAllDraws(eventData) {
  for (let i = 0; i < 10; i++) {
    const snap = JSON.stringify([eventData.mainDraw, eventData.consolationDraw, eventData.waterfallConsolationDraw]);
    populateDraw(eventData, eventData.mainDraw);
    populateDraw(eventData, eventData.consolationDraw);
    populateWaterfallDynamic(eventData);
    populateDraw(eventData, eventData.waterfallConsolationDraw);
    if (JSON.stringify([eventData.mainDraw, eventData.consolationDraw, eventData.waterfallConsolationDraw]) === snap) break;
  }
}

function fyShuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// FNV-1a 32-bit string hash → seed integer.
function strHashSeed(s) {
  let h = 2166136261 >>> 0;
  for (let i = 0; i < s.length; i++) {
    h ^= s.charCodeAt(i);
    h = Math.imul(h, 16777619) >>> 0;
  }
  return h >>> 0;
}

// Mulberry32 — deterministic PRNG used for stable WCD slot shuffling.
function mulberry32(seed) {
  let s = seed >>> 0;
  return function() {
    s = (s + 0x6D2B79F5) >>> 0;
    let t = s;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

// Returns a permutation of [0..n) determined entirely by the event ID, so
// every refresh / every user sees the same WCD R1 slot ordering.
function wcdSlotOrder(eventId, n) {
  const rng = mulberry32(strHashSeed('WCD:' + eventId));
  const arr = Array.from({ length: n }, (_, i) => i);
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function getSchoolAndRank(teamId) {
  const m = teamId.match(/_s(\d+)_t(\d+)$/);
  return m ? { schoolNum: parseInt(m[1]), teamRank: parseInt(m[2]) } : { schoolNum: -1, teamRank: -1 };
}

function isPlaceholderName(name) {
  return /^School \d+ - Team \d+$/.test(name);
}

function shuffleEventTeams(eventData) {
  const teams = [...eventData.teams];
  const realTeams = [];
  let byeCount = 0;
  teams.forEach(t => {
    if (t.id === 'BYE' || isPlaceholderName(t.name) || !t.name || !t.name.trim()) {
      byeCount++;
    } else {
      realTeams.push({ ...t });
    }
  });
  const HALF = TOTAL_TEAMS / 2;
  const MATCHES_PER_HALF = HALF / 2;
  const byesTopHalf = Math.ceil(byeCount / 2);
  const byesBotHalf = byeCount - byesTopHalf;
  const allowByeVsBye = byeCount > 16;
  if (!allowByeVsBye && (byesTopHalf > MATCHES_PER_HALF || byesBotHalf > MATCHES_PER_HALF)) {
    alert('Too many BYEs to create a valid draw (a BYE cannot face a BYE).');
    return;
  }
  const arr = new Array(TOTAL_TEAMS).fill(null);
  const mkBye = () => ({ id: 'BYE', name: 'BYE', customDisplayName: '', originalPlayerSlot: -1, mainDrawLosses: 0, consolationLosses: 0 });
  const realSlotsTop = [];
  const realSlotsBot = [];
  if (!allowByeVsBye) {
    let topMI = Array.from({ length: MATCHES_PER_HALF }, (_, i) => i);
    let botMI = Array.from({ length: MATCHES_PER_HALF }, (_, i) => i);
    fyShuffle(topMI);
    fyShuffle(botMI);
    const topByeSet = new Set(topMI.slice(0, byesTopHalf));
    const botByeSet = new Set(botMI.slice(0, byesBotHalf));
    for (let mi = 0; mi < MATCHES_PER_HALF; mi++) {
      const s1 = mi * 2, s2 = mi * 2 + 1;
      if (topByeSet.has(mi)) {
        const bs = Math.random() < 0.5 ? s1 : s2;
        arr[bs] = mkBye();
        realSlotsTop.push(bs === s1 ? s2 : s1);
      } else {
        realSlotsTop.push(s1, s2);
      }
    }
    for (let mi = 0; mi < MATCHES_PER_HALF; mi++) {
      const s1 = HALF + mi * 2, s2 = HALF + mi * 2 + 1;
      if (botByeSet.has(mi)) {
        const bs = Math.random() < 0.5 ? s1 : s2;
        arr[bs] = mkBye();
        realSlotsBot.push(bs === s1 ? s2 : s1);
      } else {
        realSlotsBot.push(s1, s2);
      }
    }
  } else {
    const realCount = realTeams.length;
    const realTopCount = Math.ceil(realCount / 2);
    const realBotCount = realCount - realTopCount;
    let topMI = Array.from({ length: MATCHES_PER_HALF }, (_, i) => i);
    let botMI = Array.from({ length: MATCHES_PER_HALF }, (_, i) => i);
    fyShuffle(topMI);
    fyShuffle(botMI);
    for (let i = 0; i < TOTAL_TEAMS; i++) {
      arr[i] = mkBye();
    }
    for (let k = 0; k < realTopCount; k++) {
      const mi = topMI[k];
      const s1 = mi * 2, s2 = mi * 2 + 1;
      const realSlot = Math.random() < 0.5 ? s1 : s2;
      arr[realSlot] = null;
      realSlotsTop.push(realSlot);
    }
    for (let k = 0; k < realBotCount; k++) {
      const mi = botMI[k];
      const s1 = HALF + mi * 2, s2 = HALF + mi * 2 + 1;
      const realSlot = Math.random() < 0.5 ? s1 : s2;
      arr[realSlot] = null;
      realSlotsBot.push(realSlot);
    }
  }
  fyShuffle(realSlotsTop);
  fyShuffle(realSlotsBot);
  const t1s = [], t2s = [];
  realTeams.forEach(t => {
    const { teamRank } = getSchoolAndRank(t.id);
    if (teamRank === 1) t1s.push(t); else t2s.push(t);
  });
  fyShuffle(t1s);
  fyShuffle(t2s);
  const loc = {};
  const PER_HALF = Math.min(Math.ceil(t1s.length / 2), realSlotsTop.length);
  for (let i = 0; i < PER_HALF && realSlotsTop.length > 0; i++) {
    arr[realSlotsTop.pop()] = t1s[i];
    loc[getSchoolAndRank(t1s[i].id).schoolNum] = 'top';
  }
  for (let i = PER_HALF; i < t1s.length && realSlotsBot.length > 0; i++) {
    arr[realSlotsBot.pop()] = t1s[i];
    loc[getSchoolAndRank(t1s[i].id).schoolNum] = 'bottom';
  }
  t2s.forEach(t => {
    const sn = getSchoolAndRank(t.id).schoolNum;
    if (loc[sn] === 'top' && realSlotsBot.length > 0) {
      arr[realSlotsBot.pop()] = t;
    } else if (loc[sn] === 'bottom' && realSlotsTop.length > 0) {
      arr[realSlotsTop.pop()] = t;
    } else if (realSlotsTop.length > 0) {
      arr[realSlotsTop.pop()] = t;
    } else if (realSlotsBot.length > 0) {
      arr[realSlotsBot.pop()] = t;
    }
  });
  eventData.teams = arr;
  [eventData.mainDraw, eventData.consolationDraw, eventData.waterfallConsolationDraw].forEach(draw => {
    if (!draw || !draw.rounds) return;
    draw.rounds.forEach(round => round.forEach(m => {
      m.team1Id = null; m.team2Id = null;
      m.score1 = []; m.score2 = [];
      m.winnerId = null; m.loserId = null;
      m.isComplete = false; m.isBye = false;
      m.marshalled = false;
    }));
  });
}

function exportTeamsCSV(tournamentData) {
  let csv = "EventCode,EventName,TeamID,TeamOriginalSlot,TeamName,CustomDisplayName\r\n";
  Object.keys(tournamentData).forEach(eid => {
    const ev = tournamentData[eid];
    if (ev && ev.teams) {
      ev.teams.forEach(t => {
        csv += `"${eid}","${EVENT_CODES[eid]}","${t.id}",${t.originalPlayerSlot},"${t.name.replace(/"/g, '""')}","${(t.customDisplayName || '').replace(/"/g, '""')}"\r\n`;
      });
    }
  });
  return csv;
}

function parseTeamsCSV(csvText) {
  const lines = csvText.split(/\r\n|\n/);
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
  const map = {};
  headers.forEach((h, i) => { map[h] = i; });
  if (!['EventCode', 'TeamID', 'TeamName'].every(k => k in map)) return { error: 'Missing required columns: EventCode, TeamID, TeamName' };
  const hasCustomName = 'CustomDisplayName' in map;
  const updates = [];
  for (let i = 1; i < lines.length; i++) {
    const line = lines[i];
    if (!line.trim()) continue;
    const data = []; let cur = '', inQ = false;
    for (let k = 0; k < line.length; k++) {
      const ch = line[k];
      if (ch === '"') {
        // CSV escape: doubled quote inside a quoted field = literal quote.
        if (inQ && line[k+1] === '"') { cur += '"'; k++; continue; }
        inQ = !inQ;
      } else if (ch === ',' && !inQ) {
        data.push(cur.trim()); cur = '';
      } else {
        cur += ch;
      }
    }
    data.push(cur.trim());
    updates.push({
      eventCode: data[map.EventCode],
      teamId: data[map.TeamID],
      teamName: data[map.TeamName],
      customDisplayName: hasCustomName ? (data[map.CustomDisplayName] || '') : undefined
    });
  }
  return { updates };
}

function generateShareCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code = '';
  for (let i = 0; i < 8; i++) code += chars[Math.floor(Math.random() * chars.length)];
  return code;
}

function buildMatchNumberMap(eventData) {
  const map = {};
  let num = 1;
  const schedule = [
    { key: 'mainDraw', roundIdx: 0 },
    { key: 'mainDraw', roundIdx: 1 },
    { key: 'consolationDraw', roundIdx: 0 },
    { key: 'mainDraw', roundIdx: 2 },
    { key: 'waterfallConsolationDraw', roundIdx: 0 },
    { key: 'consolationDraw', roundIdx: 1 },
    { key: 'consolationDraw', roundIdx: 2 },
    { key: 'mainDraw', roundIdx: 3 },
    { key: 'waterfallConsolationDraw', roundIdx: 1 },
    { key: 'consolationDraw', roundIdx: 3 },
    { key: 'consolationDraw', roundIdx: 4 },
    { key: 'waterfallConsolationDraw', roundIdx: 2 },
    { key: 'consolationDraw', roundIdx: 5 },
    { key: 'mainDraw', roundIdx: 4 },
    { key: 'consolationDraw', roundIdx: 6 },
    { key: 'consolationDraw', roundIdx: 7 },
  ];
  for (const { key, roundIdx } of schedule) {
    const draw = eventData[key];
    if (!draw || !draw.rounds || !draw.rounds[roundIdx]) continue;
    for (const match of draw.rounds[roundIdx]) {
      map[match.id] = num++;
    }
  }
  return map;
}

function findPlayerMatches(eventData, searchTerm, matchNumberMap) {
  if (!searchTerm || searchTerm.trim().length < 2) return [];
  const term = searchTerm.toLowerCase().trim();
  const matchingTeamIds = new Set();
  const checkTeam = t => {
    if (!t || t.id === 'BYE') return;
    if (t.name.toLowerCase().includes(term) || (t.customDisplayName && t.customDisplayName.toLowerCase().includes(term))) {
      matchingTeamIds.add(t.id);
    }
  };
  eventData.teams.forEach(checkTeam);
  (eventData.adhocTeams || []).forEach(checkTeam);
  if (matchingTeamIds.size === 0) return [];
  const results = [];
  const drawTypes = [
    { key: 'mainDraw', type: 'MD', label: 'Main Draw' },
    { key: 'consolationDraw', type: 'CD', label: 'Consolation' },
    { key: 'waterfallConsolationDraw', type: 'WCD', label: 'Waterfall' }
  ];
  const getName = (teamId) => {
    if (!teamId) return 'TBD';
    if (teamId === 'BYE') return 'BYE';
    const t = findTeamById(eventData, teamId);
    if (!t) return teamId;
    if (t.customDisplayName) return `${t.customDisplayName} (${t.name})`;
    return t.name;
  };
  for (const { key, type, label } of drawTypes) {
    const draw = eventData[key];
    if (!draw || !draw.rounds) continue;
    for (const round of draw.rounds) {
      for (const match of round) {
        const t1Matches = match.team1Id && matchingTeamIds.has(match.team1Id);
        const t2Matches = match.team2Id && matchingTeamIds.has(match.team2Id);
        if (!t1Matches && !t2Matches) continue;
        const playerTeamId = t1Matches ? match.team1Id : match.team2Id;
        let status = 'waiting';
        if (match.isComplete) {
          if (match.isBye) {
            status = 'bye';
          } else if (match.winnerId === playerTeamId) {
            status = 'won';
          } else {
            status = 'lost';
          }
        } else if (match.team1Id && match.team2Id && match.team1Id !== 'TBD' && match.team2Id !== 'TBD') {
          status = 'upcoming';
        }
        results.push({
          match,
          drawType: type,
          drawLabel: label,
          matchNumber: matchNumberMap[match.id] || 0,
          status,
          team1Name: getName(match.team1Id),
          team2Name: getName(match.team2Id),
          matchLabel: match.customLabel || match.id
        });
      }
    }
  }
  results.sort((a, b) => a.matchNumber - b.matchNumber);
  return results;
}

function collectDependentMatchIds(eventData, matchId, collected) {
  if (!collected) collected = new Set();
  if (collected.has(matchId)) return collected;
  collected.add(matchId);
  const allDraws = [eventData.mainDraw, eventData.consolationDraw, eventData.waterfallConsolationDraw];
  for (const draw of allDraws) {
    if (!draw || !draw.rounds) continue;
    for (const round of draw.rounds) {
      for (const m of round) {
        const src1 = m.team1Source;
        const src2 = m.team2Source;
        const ref1 = src1 && (src1.type === 'winner' || src1.type === 'loser') && src1.matchId === matchId;
        const ref2 = src2 && (src2.type === 'winner' || src2.type === 'loser') && src2.matchId === matchId;
        if (ref1 || ref2) {
          collectDependentMatchIds(eventData, m.id, collected);
        }
      }
    }
  }
  const sourceMatch = findMatchAcrossDraws(eventData, matchId);
  if (sourceMatch && sourceMatch.loserFeedsToNextBracketMatchId) {
    collectDependentMatchIds(eventData, sourceMatch.loserFeedsToNextBracketMatchId, collected);
  }
  return collected;
}

function countDownstreamPlayed(eventData, matchId) {
  const deps = collectDependentMatchIds(eventData, matchId);
  deps.delete(matchId);
  let count = 0;
  const allDraws = [eventData.mainDraw, eventData.consolationDraw, eventData.waterfallConsolationDraw];
  for (const draw of allDraws) {
    if (!draw || !draw.rounds) continue;
    for (const round of draw.rounds) {
      for (const m of round) {
        if (deps.has(m.id) && m.isComplete && !m.isBye) count++;
      }
    }
  }
  return count;
}

function resetMatchAndCascade(eventData, targetMatchId) {
  const deps = collectDependentMatchIds(eventData, targetMatchId);
  const allDraws = [eventData.mainDraw, eventData.consolationDraw, eventData.waterfallConsolationDraw];

  // Identify teams that "arrived in CD/WCD because of" any reset match. Any
  // such team currently sitting in CD R1 (via natural feed) or WCD R1 (via
  // dynamic placement) must be cleared to prevent duplicates after the
  // reset (bug 4: a player reset from MD/CD lingered in consolations).
  const toEvict = new Set();
  for (const draw of allDraws) {
    if (!draw || !draw.rounds) continue;
    for (const round of draw.rounds) {
      for (const m of round) {
        if (!deps.has(m.id)) continue;
        if (m.isComplete && !m.isBye) {
          if (m.loserId && m.loserId !== 'BYE') toEvict.add(m.loserId);
        }
      }
    }
  }

  for (const draw of allDraws) {
    if (!draw || !draw.rounds) continue;
    for (const round of draw.rounds) {
      for (const m of round) {
        if (!deps.has(m.id)) continue;
        m.winnerId = null;
        m.loserId = null;
        m.isComplete = false;
        m.isBye = false;
        m.score1 = [];
        m.score2 = [];
        m.marshalled = false;
        if (m.id !== targetMatchId) {
          if (m.team1Source && (m.team1Source.type === 'winner' || m.team1Source.type === 'loser') && deps.has(m.team1Source.matchId)) {
            m.team1Id = null;
          }
          if (m.team2Source && (m.team2Source.type === 'winner' || m.team2Source.type === 'loser') && deps.has(m.team2Source.matchId)) {
            m.team2Id = null;
          }
        }
      }
    }
  }

  // Sweep CD R1, WCD R1, and any not-yet-played match to evict the displaced
  // losers. They were placed by an upstream MD/CD result that no longer holds.
  // Played matches and matches with manualOverride are left alone.
  for (const draw of allDraws) {
    if (!draw || !draw.rounds) continue;
    for (const round of draw.rounds) {
      for (const m of round) {
        if (m.manualOverride) continue;
        if (m.isComplete && !m.isBye) continue;
        if (m.team1Id && toEvict.has(m.team1Id)) {
          m.team1Id = null;
          m.winnerId = null; m.loserId = null;
          m.isComplete = false; m.isBye = false;
          m.score1 = []; m.score2 = [];
        }
        if (m.team2Id && toEvict.has(m.team2Id)) {
          m.team2Id = null;
          m.winnerId = null; m.loserId = null;
          m.isComplete = false; m.isBye = false;
          m.score1 = []; m.score2 = [];
        }
      }
    }
  }

  // Reset all unplayed WCD slots so populateWaterfallDynamic can re-resolve
  // eligibility from scratch. Played WCD matches and manual ones are kept.
  const wcd = eventData.waterfallConsolationDraw;
  if (wcd && wcd.rounds && wcd.rounds[0]) {
    wcd.rounds[0].forEach(m => {
      if (m.manualOverride) return;
      if (m.isComplete && !m.isBye) return;
      m.team1Id = null;
      m.team2Id = null;
      m.winnerId = null;
      m.loserId = null;
      m.isComplete = false;
      m.isBye = false;
      m.score1 = [];
      m.score2 = [];
    });
    for (let ri = 1; ri < wcd.rounds.length; ri++) {
      wcd.rounds[ri].forEach(m => {
        if (m.manualOverride) return;
        if (m.isComplete && !m.isBye) return;
        m.team1Id = null;
        m.team2Id = null;
        m.winnerId = null;
        m.loserId = null;
        m.isComplete = false;
        m.isBye = false;
        m.score1 = [];
        m.score2 = [];
      });
    }
  }
}

/* ═══════════════════════════════════════════════════════════
   Manual reset for Feature 2 — scope cascade to a single draw.
   Resets the target match (clearing team ids and score state) and
   any downstream matches in the same draw, leaving other draws
   completely untouched. Used when an editor manually overrides a
   CD or WCD match and wants the WCD reset to stay inside WCD's
   7 matches without disturbing MD or CD progress.
   ═══════════════════════════════════════════════════════════ */
function resetMatchAndCascadeInDraw(eventData, targetMatchId, drawType) {
  const drawKey =
    drawType === 'MD' ? 'mainDraw' :
    drawType === 'CD' ? 'consolationDraw' :
    drawType === 'WCD' ? 'waterfallConsolationDraw' : null;
  if (!drawKey) return;
  const draw = eventData[drawKey];
  if (!draw || !draw.rounds) return;

  // Walk forward through this draw only, collecting all matches whose
  // team1Source/team2Source points back to anything already in deps.
  const deps = new Set([targetMatchId]);
  let grew = true;
  while (grew) {
    grew = false;
    for (const round of draw.rounds) {
      for (const m of round) {
        if (deps.has(m.id)) continue;
        const s1 = m.team1Source, s2 = m.team2Source;
        const ref1 = s1 && (s1.type === 'winner' || s1.type === 'loser') && deps.has(s1.matchId);
        const ref2 = s2 && (s2.type === 'winner' || s2.type === 'loser') && deps.has(s2.matchId);
        if (ref1 || ref2) { deps.add(m.id); grew = true; }
      }
    }
  }

  for (const round of draw.rounds) {
    for (const m of round) {
      if (!deps.has(m.id)) continue;
      m.winnerId = null;
      m.loserId = null;
      m.isComplete = false;
      m.isBye = false;
      m.score1 = [];
      m.score2 = [];
      m.marshalled = false;
      if (m.id === targetMatchId) {
        m.team1Id = null;
        m.team2Id = null;
      } else {
        if (m.team1Source && (m.team1Source.type === 'winner' || m.team1Source.type === 'loser') && deps.has(m.team1Source.matchId)) {
          m.team1Id = null;
        }
        if (m.team2Source && (m.team2Source.type === 'winner' || m.team2Source.type === 'loser') && deps.has(m.team2Source.matchId)) {
          m.team2Id = null;
        }
      }
    }
  }
}

async function createTournament(name, userId) {
  const code = generateShareCode();
  const ref = await db.collection('tournaments').add({
    name, ownerId: userId, createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    shareCode: code, authorizedEditors: []
  });
  const tData = createFullTournamentData();
  const batch = db.batch();
  Object.keys(tData).forEach(eid => {
    batch.set(ref.collection('events').doc(eid), serializeEventForFirestore(tData[eid]));
  });
  await batch.commit();
  return { id: ref.id, shareCode: code };
}

async function loadTournamentMeta(tournamentId) {
  const snap = await db.collection('tournaments').doc(tournamentId).get();
  return snap.exists ? { id: snap.id, ...snap.data() } : null;
}

async function loadTournamentEvents(tournamentId) {
  const snap = await db.collection('tournaments').doc(tournamentId).collection('events').get();
  const data = {};
  snap.forEach(doc => { data[doc.id] = deserializeEventFromFirestore(doc.data()); });
  return data;
}

async function saveEventData(tournamentId, eventId, eventData) {
  await db.collection('tournaments').doc(tournamentId).collection('events').doc(eventId)
    .set(serializeEventForFirestore(eventData));
}

async function saveAllEvents(tournamentId, allEvents) {
  const batch = db.batch();
  Object.keys(allEvents).forEach(eid => {
    batch.set(
      db.collection('tournaments').doc(tournamentId).collection('events').doc(eid),
      serializeEventForFirestore(allEvents[eid])
    );
  });
  await batch.commit();
}

async function findTournamentByShareCode(code) {
  const snap = await db.collection('tournaments').where('shareCode', '==', code).limit(1).get();
  if (snap.empty) return null;
  const doc = snap.docs[0];
  return { id: doc.id, ...doc.data() };
}

async function getUserTournaments(userId, userEmail) {
  const results = [];
  const owned = await db.collection('tournaments').where('ownerId', '==', userId).get();
  owned.forEach(doc => results.push({ id: doc.id, ...doc.data(), _role: 'owner' }));
  if (userEmail) {
    const editable = await db.collection('tournaments').where('authorizedEditors', 'array-contains', userEmail).get();
    editable.forEach(doc => {
      if (!results.find(r => r.id === doc.id)) {
        results.push({ id: doc.id, ...doc.data(), _role: 'editor' });
      }
    });
  }
  results.sort((a, b) => {
    const ta = a.createdAt ? a.createdAt.seconds : 0;
    const tb = b.createdAt ? b.createdAt.seconds : 0;
    return tb - ta;
  });
  return results;
}

async function addEditor(tournamentId, email) {
  await db.collection('tournaments').doc(tournamentId).update({
    authorizedEditors: firebase.firestore.FieldValue.arrayUnion(email)
  });
}

async function deleteTournament(tournamentId) {
  const eventsSnap = await db.collection('tournaments').doc(tournamentId).collection('events').get();
  const batch = db.batch();
  eventsSnap.forEach(doc => batch.delete(doc.ref));
  batch.delete(db.collection('tournaments').doc(tournamentId));
  await batch.commit();
}

function subscribeToEvent(tournamentId, eventId, callback) {
  return db.collection('tournaments').doc(tournamentId).collection('events').doc(eventId).onSnapshot(snap => {
    if (snap.exists) callback(deserializeEventFromFirestore(snap.data()));
  });
}

  const [joinCode, setJoinCode] = useState('');
  const [showJoin, setShowJoin] = useState(false);
  const [joinError, setJoinError] = useState('');

  useEffect(() => { loadList(); }, []);

  const loadList = async () => {
    setLoading(true);
    try {
      const list = await getUserTournaments(user.uid, user.email);
      setTournaments(list);
    } catch (err) {
      console.error('Error loading tournaments:', err);
      setTournaments([]);
    }

  };

  const handleCreate = async () => {
    if (!newName.trim()) return;
    setCreating(true);

function ShareModal({ shareCode, onClose }) {
  const [qrDataUrl, setQrDataUrl] = useState(null);
  const [qrError, setQrError] = useState(false);
  const shareUrl = `${window.location.origin}${window.location.pathname}?share=${shareCode}`;

  useEffect(() => {
    let cancelled = false;
    let attempts = 0;
    const maxAttempts = 25;
    const tryGenerate = () => {
      if (cancelled) return;
      attempts++;
      if (typeof QRCode !== 'undefined' && typeof QRCode.toDataURL === 'function') {
        QRCode.toDataURL(shareUrl, {
          width: 220, margin: 2,
          color: { dark: '#1a1e2c', light: '#ffffff' }
        })
        .then(url => { if (!cancelled) setQrDataUrl(url); })
        .catch(err => {
          console.error('QR generation error:', err);
          if (!cancelled) setQrError(true);
        });
      } else if (attempts < maxAttempts) {
        setTimeout(tryGenerate, 200);
      } else {
        if (!cancelled) setQrError(true);
      }
    };
    tryGenerate();
    return () => { cancelled = true; };
  }, [shareUrl]);

  const copyUrl = () => {
    navigator.clipboard.writeText(shareUrl).then(() => alert('Link copied!')).catch(() => {});
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-content" onClick={e => e.stopPropagation()}>
        <h2>📱 Share Tournament (Read-Only)</h2>
        <p className="text-dim text-sm mb-2">Scan this QR code or share the link. Viewers can see live results but cannot edit.</p>
        <div className="qr-container">
          {qrDataUrl ? (
            <img src={qrDataUrl} alt="QR Code" style={{ width: 220, height: 220, borderRadius: 'var(--radius)' }} />
          ) : qrError ? (
            <div style={{ width: 220, height: 220, display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'var(--bg-input)', borderRadius: 'var(--radius)', color: 'var(--red)', fontSize: '0.85rem', textAlign: 'center', padding: '16px' }}>
              QR library failed to load. Use the link below instead.
            </div>
          ) : (
            <div style={{ width: 220, height: 220, display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'var(--bg-input)', borderRadius: 'var(--radius)', color: 'var(--text-dim)', fontSize: '0.85rem' }}>
              <span className="spinner" style={{ marginRight: 8 }}></span> Generating QR...
            </div>
          )}
          <div className="share-url">{shareUrl}</div>
          <div className="flex-row">
            <button className="btn btn-primary btn-sm" onClick={copyUrl}>Copy Link</button>
            <button className="btn btn-sm" onClick={onClose}>Close</button>
          </div>
        </div>
        <p className="text-dim text-sm text-center mt-2">Share Code: <strong style={{ fontFamily: 'var(--font-mono)', letterSpacing: 2, color: 'var(--accent)' }}>{shareCode}</strong></p>
      </div>
    </div>
  );
}

function PlayerSearchBar({ eventData, matchNumberMap, onScrollToMatch }) {
  const [query, setQuery] = useState('');
  const inputRef = useRef(null);

  const results = useMemo(() => {
    return findPlayerMatches(eventData, query, matchNumberMap);
  }, [eventData, query, matchNumberMap]);

  const nextMatchId = useMemo(() => {
    const upcoming = results.find(r => r.status === 'upcoming');
    if (upcoming) return upcoming.match.id;
    const waiting = results.find(r => r.status === 'waiting');
    return waiting ? waiting.match.id : null;
  }, [results]);

  const handleClear = () => {
    setQuery('');
    if (inputRef.current) inputRef.current.focus();
  };

  const getStatusLabel = (status, matchId) => {
    if (matchId === nextMatchId && (status === 'upcoming' || status === 'waiting')) {
      return { text: status === 'upcoming' ? 'NEXT MATCH' : 'UP NEXT', cls: 'next' };
    }
    switch (status) {
      case 'upcoming': return { text: 'Ready', cls: 'upcoming' };
      case 'waiting': return { text: 'Waiting', cls: 'waiting' };
      case 'won': return { text: 'Won', cls: 'won' };
      case 'lost': return { text: 'Lost', cls: 'lost' };
      case 'bye': return { text: 'BYE', cls: 'won' };
      default: return { text: status, cls: 'waiting' };
    }
  };

  return (
    <div className="player-search-bar">
      <div className="search-input-row">
        <span className="search-icon">🔍</span>
        <input
          ref={inputRef}
          type="text"
          placeholder="Find your next match — type your name or school..."
          value={query}
          onChange={e => setQuery(e.target.value)}
        />
        {query && <button className="search-clear" onClick={handleClear}>✕</button>}
      </div>
      {query.trim().length >= 2 && (
        <div className="search-results">
          {results.length > 0 ? (
            <>
              <div className="search-results-header">
                {results.length} match{results.length !== 1 ? 'es' : ''} found
              </div>
              <div className="search-results-list">
                {results.map(r => {
                  const sl = getStatusLabel(r.status, r.match.id);
                  const isNext = r.match.id === nextMatchId && (r.status === 'upcoming' || r.status === 'waiting');
                  const isCompleted = r.status === 'won' || r.status === 'lost' || r.status === 'bye';
                  return (
                    <div
                      key={r.match.id}
                      className={`search-result-item ${isNext ? 'next-match' : ''} ${isCompleted ? 'completed-match' : ''}`}
                      onClick={() => onScrollToMatch(r.match.id)}
                    >
                      <span className="search-result-match-num">Match #{r.matchNumber}</span>
                      <div className="search-result-detail">
                        <div className="matchup">{r.team1Name} vs {r.team2Name}</div>
                        <div className="draw-info">{r.drawLabel} — {r.matchLabel}</div>
                      </div>
                      <span className={`search-result-status ${sl.cls}`}>{sl.text}</span>
                    </div>
                  );
                })}
              </div>
            </>
          ) : (
            <div className="search-no-results">No matches found for "{query}"</div>
          )}
        </div>
      )}
    </div>
  );
}

function CustomNameEditor({ teamId, currentCustomName, onSave }) {
  const [editing, setEditing] = useState(false);
  const [value, setValue] = useState(currentCustomName || '');
  const inputRef = useRef(null);

  useEffect(() => {
    setValue(currentCustomName || '');
  }, [currentCustomName]);

  useEffect(() => {
    if (editing && inputRef.current) {
      inputRef.current.focus();
      inputRef.current.select();
    }
  }, [editing]);

  const handleSave = () => {
    onSave(teamId, value.trim());
    setEditing(false);
  };

  const handleCancel = () => {
    setValue(currentCustomName || '');
    setEditing(false);
  };

  const handleKeyDown = (e) => {
    if (e.key === 'Enter') handleSave();
    if (e.key === 'Escape') handleCancel();
  };

  if (!teamId || teamId === 'BYE') return null;

  if (editing) {
    return (
      <div className="custom-name-inline-edit" onClick={e => e.stopPropagation()}>
        <input
          ref={inputRef}
          type="text"
          placeholder="Player name..."

          onKeyDown={handleKeyDown}
          maxLength={60}

        <button className="cn-save" onClick={handleSave} title="Save">✓</button>
        <button className="cn-cancel" onClick={handleCancel} title="Cancel">✕</button>

    );
  }

  return (
    <div className="custom-name-row">
      {currentCustomName ? (
        <span className="custom-name-tag">{currentCustomName}</span>
      ) : null}
      <button
        className="custom-name-edit-btn"
