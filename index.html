<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Badminton Tournament Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<style>
/* ═══════════════════════════════════════════════════════════
   CSS — Badminton Tournament Manager
   ═══════════════════════════════════════════════════════════ */
:root {
  --bg: #f0f2f5;
  --bg-card: #ffffff;
  --bg-card-hover: #f7f8fa;
  --bg-input: #f5f6f8;
  --border: #d8dce5;
  --border-focus: #4a6cf7;
  --text: #3a3f51;
  --text-dim: #8890a4;
  --text-bright: #1a1e2c;
  --accent: #4a6cf7;
  --accent-hover: #3b5be6;
  --accent-dim: rgba(74,108,247,0.10);
  --green: #1a9d5a;
  --green-dim: rgba(26,157,90,0.10);
  --red: #dc3545;
  --red-dim: rgba(220,53,69,0.08);
  --orange: #d48a07;
  --orange-dim: rgba(212,138,7,0.10);
  --purple: #7c4dff;
  --purple-dim: rgba(124,77,255,0.10);
  --teal: #0ca6a0;
  --teal-dim: rgba(12,166,160,0.10);
  --yellow: #d4a017;
  --font-body: 'DM Sans', sans-serif;
  --font-mono: 'Space Mono', monospace;
  --radius: 8px;
  --radius-lg: 14px;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; }
body { font-family: var(--font-body); background: var(--bg); color: var(--text); min-height: 100vh; }
input, button, select, textarea { font-family: inherit; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #c4c9d4; border-radius: 3px; }

/* Layout */
.app-shell { max-width: 1400px; margin: 0 auto; padding: 16px; }
.top-bar { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
.top-bar h1 { font-size: 1.25rem; font-weight: 700; color: var(--text-bright); display: flex; align-items: center; gap: 8px; }
.top-bar h1 span.icon { font-size: 1.4rem; }
.top-bar-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.user-badge { font-size: 0.8rem; color: var(--text-dim); background: var(--accent-dim); padding: 4px 10px; border-radius: 20px; }

/* Buttons */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer; font-size: 0.85rem; font-weight: 500; transition: all 0.15s; background: var(--bg-card); color: var(--text); }
.btn:hover { background: var(--bg-card-hover); border-color: var(--text-dim); }
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
.btn-danger { background: var(--red-dim); color: var(--red); border-color: transparent; }
.btn-danger:hover { background: var(--red); color: #fff; }
.btn-green { background: var(--green-dim); color: var(--green); border-color: transparent; }
.btn-green:hover { background: var(--green); color: #fff; }
.btn-orange { background: var(--orange-dim); color: var(--orange); border-color: transparent; }
.btn-orange:hover { background: var(--orange); color: #fff; }
.btn-purple { background: var(--purple-dim); color: var(--purple); border-color: transparent; }
.btn-purple:hover { background: var(--purple); color: #fff; }
.btn-sm { padding: 5px 10px; font-size: 0.78rem; }
.btn-block { width: 100%; justify-content: center; }

/* Cards / Panels */
.card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; }
.card + .card { margin-top: 12px; }
.card h2 { font-size: 1.1rem; font-weight: 700; color: var(--text-bright); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.card h3 { font-size: 0.95rem; font-weight: 600; color: var(--text); margin-bottom: 10px; }

/* Form Inputs */
.input { width: 100%; padding: 9px 12px; background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text-bright); font-size: 0.9rem; transition: border-color 0.15s; }
.input:focus { outline: none; border-color: var(--border-focus); }
.input::placeholder { color: var(--text-dim); }
.form-group { margin-bottom: 12px; }
.form-group label { display: block; font-size: 0.8rem; color: var(--text-dim); margin-bottom: 4px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }

/* Auth Screen */
.auth-wrapper { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
.auth-card { width: 100%; max-width: 400px; }
.auth-card h1 { text-align: center; margin-bottom: 6px; font-size: 1.6rem; color: var(--text-bright); }
.auth-card .subtitle { text-align: center; color: var(--text-dim); margin-bottom: 24px; font-size: 0.9rem; }
.auth-toggle { text-align: center; margin-top: 16px; font-size: 0.85rem; color: var(--text-dim); }
.auth-toggle a { color: var(--accent); cursor: pointer; text-decoration: none; }
.auth-toggle a:hover { text-decoration: underline; }
.auth-error { background: var(--red-dim); color: var(--red); padding: 8px 12px; border-radius: var(--radius); margin-bottom: 12px; font-size: 0.85rem; }

/* Tournament List */
.tournament-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
.tournament-tile { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 18px; cursor: pointer; transition: all 0.15s; }
.tournament-tile:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: var(--shadow); }
.tournament-tile h3 { font-size: 1rem; color: var(--text-bright); margin-bottom: 6px; }
.tournament-tile .meta { font-size: 0.78rem; color: var(--text-dim); }
.create-tile { border-style: dashed; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; color: var(--text-dim); min-height: 120px; }
.create-tile:hover { color: var(--accent); border-color: var(--accent); }
.create-tile .plus { font-size: 2rem; line-height: 1; }

/* Event Tabs */
.event-tabs { display: flex; gap: 4px; overflow-x: auto; padding: 4px; background: var(--bg-input); border-radius: var(--radius); margin-bottom: 16px; }
.event-tab { padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-weight: 500; color: var(--text-dim); background: transparent; border: none; white-space: nowrap; transition: all 0.15s; }
.event-tab:hover { color: var(--text); }
.event-tab.active { background: var(--accent); color: #fff; }

/* Team Setup */
.team-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 8px; }
.team-row { display: flex; align-items: center; gap: 8px; padding: 6px 10px; background: var(--bg-input); border-radius: var(--radius); border: 1px solid var(--border); }
.team-row label { font-size: 0.75rem; color: var(--text-dim); min-width: 56px; font-family: var(--font-mono); }
.team-row input { flex: 1; background: transparent; border: none; color: var(--text-bright); font-size: 0.85rem; padding: 4px 0; }
.team-row input:focus { outline: none; }

/* Draw bracket */
.draw-section { margin-top: 16px; }
.draw-section h3 { font-size: 1rem; font-weight: 600; color: var(--accent); margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
.draw-container { display: flex; overflow-x: auto; padding: 12px 4px 12px 0; gap: 4px; min-height: 300px; }
.round-col { display: flex; flex-direction: column; justify-content: space-around; min-width: 260px; padding: 0 6px; border-right: 1px dashed var(--border); }
.round-col:last-child { border-right: none; }
.round-header { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); font-family: var(--font-mono); text-align: center; padding: 4px 0 8px; }

/* Match card */
.match-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px; margin: 6px 0; transition: border-color 0.15s; }
.match-card:hover { border-color: var(--text-dim); }
.match-card.complete { border-color: var(--green); border-left: 3px solid var(--green); }
.match-card.bye { border-color: var(--text-dim); opacity: 0.6; }
.match-label { font-size: 0.68rem; color: var(--text-dim); font-family: var(--font-mono); margin-bottom: 6px; text-align: right; }
.match-team { display: flex; align-items: center; gap: 6px; padding: 5px 0; border-bottom: 1px solid var(--border); }
.match-team:last-of-type { border-bottom: none; }
.match-team-name { flex: 1; font-size: 0.85rem; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.match-team.winner .match-team-name { color: var(--green); font-weight: 700; }
.match-team.loser .match-team-name { color: var(--text-dim); text-decoration: line-through; }
.match-scores { display: flex; gap: 3px; }
.score-box { width: 36px; padding: 3px; text-align: center; background: var(--bg-input); border: 1px solid var(--border); border-radius: 4px; color: var(--text-bright); font-size: 0.82rem; font-family: var(--font-mono); }
.score-box:focus { border-color: var(--accent); outline: none; }
.score-box:disabled { opacity: 0.5; }
.match-save-btn { width: 100%; margin-top: 8px; padding: 6px; background: var(--green-dim); color: var(--green); border: none; border-radius: 6px; cursor: pointer; font-size: 0.8rem; font-weight: 600; transition: all 0.15s; }
.match-save-btn:hover { background: var(--green); color: #fff; }
.match-bye-text { text-align: center; font-size: 0.8rem; color: var(--text-dim); font-style: italic; padding: 4px 0; }
.match-winner-text { text-align: center; font-size: 0.78rem; color: var(--green); font-weight: 600; margin-top: 4px; }

/* Controls bar */
.controls-bar { display: flex; gap: 8px; flex-wrap: wrap; padding: 12px 16px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); margin-bottom: 16px; }
.controls-bar .sep { width: 1px; background: var(--border); margin: 0 4px; }

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
.modal-content { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 24px; max-width: 500px; width: 100%; max-height: 90vh; overflow-y: auto; }
.modal-content h2 { margin-bottom: 16px; }
.modal-close { position: absolute; top: 12px; right: 16px; background: none; border: none; color: var(--text-dim); font-size: 1.4rem; cursor: pointer; }

/* QR section */
.qr-container { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 20px; }
.qr-container canvas { border-radius: var(--radius); }
.share-url { font-family: var(--font-mono); font-size: 0.78rem; color: var(--text-dim); word-break: break-all; text-align: center; background: var(--bg-input); padding: 8px 12px; border-radius: var(--radius); width: 100%; }

/* Read-only banner */
.readonly-banner { background: var(--orange-dim); color: var(--orange); padding: 10px 16px; border-radius: var(--radius); margin-bottom: 12px; text-align: center; font-size: 0.88rem; font-weight: 500; }

/* Config screen */
.config-box { background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin: 20px auto; max-width: 600px; }
.config-box pre { background: var(--bg-card); padding: 12px; border-radius: var(--radius); font-size: 0.78rem; overflow-x: auto; color: var(--accent); font-family: var(--font-mono); line-height: 1.6; }
.config-box p { color: var(--text-dim); font-size: 0.88rem; line-height: 1.6; margin-bottom: 10px; }
.config-box h2 { color: var(--text-bright); margin-bottom: 12px; }

/* Spinner */
.spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-center { display: flex; align-items: center; justify-content: center; padding: 60px; gap: 12px; color: var(--text-dim); }

/* Responsive */
@media (max-width: 640px) {
  .top-bar { flex-direction: column; align-items: stretch; text-align: center; }
  .top-bar-actions { justify-content: center; }
  .controls-bar { flex-direction: column; }
  .controls-bar .sep { width: 100%; height: 1px; margin: 4px 0; }
  .event-tabs { flex-wrap: nowrap; }
}

/* Utility */
.hidden { display: none !important; }
.mt-2 { margin-top: 8px; }
.mt-4 { margin-top: 16px; }
.mb-2 { margin-bottom: 8px; }
.text-center { text-align: center; }
.text-dim { color: var(--text-dim); }
.text-sm { font-size: 0.82rem; }
.flex-row { display: flex; gap: 8px; align-items: center; }
.flex-wrap { flex-wrap: wrap; }
.gap-2 { gap: 8px; }
</style>

<body>
<div id="root"></div>

<script type="text/babel">
/* ═══════════════════════════════════════════════════════════
   FIREBASE CONFIG — Replace with your own Firebase project
   ═══════════════════════════════════════════════════════════ */
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyDmPzyNjDT37ZGuEPZjXzROpB0WRGpteIM",
  authDomain: "badminton-4bf63.firebaseapp.com",
  projectId: "badminton-4bf63",
  storageBucket: "badminton-4bf63.firebasestorage.app",
  messagingSenderId: "887242367972",
  appId: "1:887242367972:web:fcf408e773fa5aba2cddf1"
};

const IS_CONFIGURED = FIREBASE_CONFIG.apiKey !== "YOUR_API_KEY";

let fb = null, db = null, auth = null;
if (IS_CONFIGURED) {
  fb = firebase.initializeApp(FIREBASE_CONFIG);
  db = firebase.firestore();
  auth = firebase.auth();
}

/* ═══════════════════════════════════════════════════════════
   CONSTANTS
   ═══════════════════════════════════════════════════════════ */
const EVENT_CODES = {
  BS: "Boy's Singles", GS: "Girl's Singles",
  BD: "Boy's Doubles", GD: "Girl's Doubles",
  XD: "Mixed Doubles"
};
const NUM_SCHOOLS = 16;
const TEAMS_PER_SCHOOL = 2;
const TOTAL_TEAMS = NUM_SCHOOLS * TEAMS_PER_SCHOOL; // 32

/* ═══════════════════════════════════════════════════════════
   FIRESTORE SERIALIZATION
   Firestore does not support nested arrays (array of arrays).
   The draw.rounds field is [[match,...], [match,...], ...].
   We convert rounds to an object keyed by round index on save,
   and convert back to an array of arrays on load.
   We also ensure score arrays contain only non-undefined values.
   ═══════════════════════════════════════════════════════════ */

function sanitizeScoreArray(arr) {
  if (!Array.isArray(arr)) return [];
  return arr.map(v => (v === undefined ? null : v));
}

function serializeDrawForFirestore(draw) {
  if (!draw || !draw.rounds) return draw;
  const serialized = { ...draw };
  if (Array.isArray(serialized.rounds)) {
    const roundsObj = {};
    serialized.rounds.forEach((round, i) => {
      roundsObj[String(i)] = round.map(match => ({
        ...match,
        score1: sanitizeScoreArray(match.score1),
        score2: sanitizeScoreArray(match.score2)
      }));
    });
    serialized.rounds = roundsObj;
  }
  return serialized;
}

function deserializeDrawFromFirestore(draw) {
  if (!draw || !draw.rounds) return draw;
  const deserialized = { ...draw };
  if (!Array.isArray(deserialized.rounds) && typeof deserialized.rounds === 'object') {
    const keys = Object.keys(deserialized.rounds)
      .map(k => parseInt(k, 10))
      .filter(k => !isNaN(k))
      .sort((a, b) => a - b);
    deserialized.rounds = keys.map(k => {
      const round = deserialized.rounds[String(k)];
      return Array.isArray(round) ? round.map(m => ({
        ...m,
        score1: Array.isArray(m.score1) ? m.score1 : [],
        score2: Array.isArray(m.score2) ? m.score2 : []
      })) : [];
    });
  }
  return deserialized;
}

function serializeEventForFirestore(eventData) {
  const data = JSON.parse(JSON.stringify(eventData));
  data.mainDraw = serializeDrawForFirestore(data.mainDraw);
  data.consolationDraw = serializeDrawForFirestore(data.consolationDraw);
  data.waterfallConsolationDraw = serializeDrawForFirestore(data.waterfallConsolationDraw);
  return data;
}

function deserializeEventFromFirestore(eventData) {
  if (!eventData) return eventData;
  const data = JSON.parse(JSON.stringify(eventData));
  data.mainDraw = deserializeDrawFromFirestore(data.mainDraw);
  data.consolationDraw = deserializeDrawFromFirestore(data.consolationDraw);
  data.waterfallConsolationDraw = deserializeDrawFromFirestore(data.waterfallConsolationDraw);
  return data;
}

/* ═══════════════════════════════════════════════════════════
   TOURNAMENT LOGIC — Draw generation, scoring, shuffling
   ═══════════════════════════════════════════════════════════ */

function createInitialTeams(eventId) {
  const teams = [];
  for (let i = 0; i < NUM_SCHOOLS; i++) {
    for (let j = 0; j < TEAMS_PER_SCHOOL; j++) {
      teams.push({
        id: `${eventId}_s${i+1}_t${j+1}`,
        name: `School ${i+1} - Team ${j+1}`,
        originalPlayerSlot: teams.length,
        mainDrawLosses: 0,
        consolationLosses: 0
      });
    }
  }
  return teams;
}

function makeMatch(id, round, matchInRound, team1Source, team2Source, opts = {}) {
  return {
    id, round, matchInRound,
    customLabel: opts.customLabel || '',
    team1Id: null, team2Id: null,
    team1Source: team1Source || null,
    team2Source: team2Source || null,
    score1: [], score2: [],
    winnerId: null, loserId: null,
    isBye: false, isComplete: false,
    isSF: !!opts.isSF, isFinal: !!opts.isFinal,
    isOverallChampionship: !!opts.isOverallChampionship,
    isThirdPlacePlayoff: !!opts.isThirdPlacePlayoff,
    loserFeedsToNextBracketMatchId: opts.loserFeed || null,
    loserFeedsToNextBracketSlotNumber: opts.loserSlot || null,
    nextBracketType: opts.nextBracketType || null
  };
}

function generateMainDraw() {
  const rounds = [];
  // R1: 16 matches (32 seeds)
  let r = [];
  for (let i = 0; i < 16; i++) {
    r.push(makeMatch(`M1.${i+1}`, 1, i+1,
      { type: 'seed', slot: i*2 }, { type: 'seed', slot: i*2+1 },
      { customLabel: `MD R1.${i+1}`, loserFeed: `CD1.${Math.floor(i/2)+1}`, loserSlot: (i%2===0)?1:2, nextBracketType: 'CD' }));
  }
  rounds.push(r);

  // R2: 8 matches
  r = [];
  for (let i = 0; i < 8; i++) {
    r.push(makeMatch(`M2.${i+1}`, 2, i+1,
      { type: 'winner', matchId: `M1.${i*2+1}` }, { type: 'winner', matchId: `M1.${i*2+2}` },
      { customLabel: `MD R2.${i+1}`, loserFeed: `CD2.${i+1}`, loserSlot: 2, nextBracketType: 'CD' }));
  }
  rounds.push(r);

  // R3 QF: 4 matches
  r = [];
  for (let i = 0; i < 4; i++) {
    r.push(makeMatch(`M3.${i+1}`, 3, i+1,
      { type: 'winner', matchId: `M2.${i*2+1}` }, { type: 'winner', matchId: `M2.${i*2+2}` },
      { customLabel: `MD QF.${i+1}`, loserFeed: `CD4.${i+1}`, loserSlot: 2, nextBracketType: 'CD' }));
  }
  rounds.push(r);

  // R4 SF: 2 matches (Bo3)
  r = [];
  for (let i = 0; i < 2; i++) {
    r.push(makeMatch(`M4.${i+1}`, 4, i+1,
      { type: 'winner', matchId: `M3.${i*2+1}` }, { type: 'winner', matchId: `M3.${i*2+2}` },
      { customLabel: `MD SF.${i+1}`, isSF: true, loserFeed: `CD6.${i+1}`, loserSlot: 2, nextBracketType: 'CD' }));
  }
  rounds.push(r);

  // R5 Final: 1 match (Bo3)
  r = [makeMatch('M5.1', 5, 1,
    { type: 'winner', matchId: 'M4.1' }, { type: 'winner', matchId: 'M4.2' },
    { customLabel: 'MD Final', isFinal: true })];
  rounds.push(r);

  // R6 Overall Championship (Bo3)
  r = [makeMatch('M6.1', 6, 1,
    { type: 'winner', matchId: 'M5.1' }, { type: 'winner', matchId: 'CD7.1' },
    { customLabel: 'Overall Championship', isFinal: true, isOverallChampionship: true })];
  rounds.push(r);

  return { rounds };
}

function generateConsolationDraw() {
  const rounds = [];
  // CD-R1: 8 matches (16 MD-R1 losers)
  let r = [];
  for (let i = 0; i < 8; i++) {
    r.push(makeMatch(`CD1.${i+1}`, 1, i+1,
      { type: 'loser', matchId: `M1.${i*2+1}` }, { type: 'loser', matchId: `M1.${i*2+2}` },
      { customLabel: `CD R1.${i+1}`, loserFeed: `WCD1.${Math.floor(i/2)+1}`, loserSlot: (i%2===0)?1:2, nextBracketType: 'WCD' }));
  }
  rounds.push(r);

  // CD-R2: 8 matches (CD-R1 winners vs MD-R2 losers)
  r = [];
  for (let i = 0; i < 8; i++) {
    r.push(makeMatch(`CD2.${i+1}`, 2, i+1,
      { type: 'winner', matchId: `CD1.${i+1}` }, { type: 'loser', matchId: `M2.${i+1}` },
      { customLabel: `CD R2.${i+1}` }));
  }
  rounds.push(r);

  // CD-R3: 4 matches playdown
  r = [];
  for (let i = 0; i < 4; i++) {
    r.push(makeMatch(`CD3.${i+1}`, 3, i+1,
      { type: 'winner', matchId: `CD2.${i*2+1}` }, { type: 'winner', matchId: `CD2.${i*2+2}` },
      { customLabel: `CD R3.${i+1} (Playdown)` }));
  }
  rounds.push(r);

  // CD-R4: 4 matches (CD-R3 winners vs MD-QF losers)
  r = [];
  for (let i = 0; i < 4; i++) {
    r.push(makeMatch(`CD4.${i+1}`, 4, i+1,
      { type: 'winner', matchId: `CD3.${i+1}` }, { type: 'loser', matchId: `M3.${i+1}` },
      { customLabel: `CD R4.${i+1} (vs QFL)` }));
  }
  rounds.push(r);

  // CD-R5: 2 matches playdown
  r = [];
  for (let i = 0; i < 2; i++) {
    r.push(makeMatch(`CD5.${i+1}`, 5, i+1,
      { type: 'winner', matchId: `CD4.${i*2+1}` }, { type: 'winner', matchId: `CD4.${i*2+2}` },
      { customLabel: `CD R5.${i+1} (Playdown)` }));
  }
  rounds.push(r);

  // CD-R6: 2 CD SF matches (CD-R5 winners vs MD-SF losers)
  r = [];
  for (let i = 0; i < 2; i++) {
    r.push(makeMatch(`CD6.${i+1}`, 6, i+1,
      { type: 'winner', matchId: `CD5.${i+1}` }, { type: 'loser', matchId: `M4.${i+1}` },
      { customLabel: `CD SF.${i+1}` }));
  }
  rounds.push(r);

  // CD-R7: Final
  r = [makeMatch('CD7.1', 7, 1,
    { type: 'winner', matchId: 'CD6.1' }, { type: 'winner', matchId: 'CD6.2' },
    { customLabel: 'CD Final', isFinal: true })];
  rounds.push(r);

  // CD-R8: 3rd Place
  r = [makeMatch('CD8.1', 8, 1,
    { type: 'loser', matchId: 'M5.1' }, { type: 'loser', matchId: 'CD7.1' },
    { customLabel: '3rd Place Playoff', isThirdPlacePlayoff: true })];
  rounds.push(r);

  return { rounds };
}

function generateWaterfallDraw() {
  const rounds = [];
  // WCD-R1: 4 matches (8 CD-R1 losers)
  let r = [];
  for (let i = 0; i < 4; i++) {
    r.push(makeMatch(`WCD1.${i+1}`, 1, i+1,
      { type: 'loser', matchId: `CD1.${i*2+1}` }, { type: 'loser', matchId: `CD1.${i*2+2}` },
      { customLabel: `WCD R1.${i+1}` }));
  }
  rounds.push(r);

  // WCD-R2 SF: 2 matches
  r = [];
  for (let i = 0; i < 2; i++) {
    r.push(makeMatch(`WCD2.${i+1}`, 2, i+1,
      { type: 'winner', matchId: `WCD1.${i*2+1}` }, { type: 'winner', matchId: `WCD1.${i*2+2}` },
      { customLabel: `WCD SF.${i+1}` }));
  }
  rounds.push(r);

  // WCD-R3 Final
  r = [makeMatch('WCD3.1', 3, 1,
    { type: 'winner', matchId: 'WCD2.1' }, { type: 'winner', matchId: 'WCD2.2' },
    { customLabel: 'WCD Final' })];
  rounds.push(r);

  return { rounds };
}

function createEventObject(eventId) {
  return {
    id: eventId, name: EVENT_CODES[eventId],
    teams: createInitialTeams(eventId),
    mainDraw: generateMainDraw(),
    consolationDraw: generateConsolationDraw(),
    waterfallConsolationDraw: generateWaterfallDraw(),
    setupComplete: false
  };
}

function createFullTournamentData() {
  const data = {};
  Object.keys(EVENT_CODES).forEach(eid => { data[eid] = createEventObject(eid); });
  return data;
}

/* --- Scoring Rules --- */
function checkGameWinner(s1, s2) {
  if (s1 === null || s2 === null || s1 === undefined || s2 === undefined || String(s1).trim() === '' || String(s2).trim() === '') return null;
  const p1 = parseInt(s1), p2 = parseInt(s2);
  if (isNaN(p1) || isNaN(p2)) return null;
  if (p1 === 30 && p1 > p2) return 1;
  if (p2 === 30 && p2 > p1) return 2;
  if (p1 < 30 && p2 < 30) {
    if (p1 >= 21 && p1 >= p2 + 2) return 1;
    if (p2 >= 21 && p2 >= p1 + 2) return 2;
  }
  return null;
}

function isBo3(match, drawType) {
  return (drawType === 'MD' && (match.isSF || match.isFinal || match.isOverallChampionship)) ||
         (drawType === 'CD' && match.isFinal && !match.isThirdPlacePlayoff);
}

function determineMatchWinner(match, drawType) {
  const bo3 = isBo3(match, drawType);
  const numGames = bo3 ? 3 : 1;
  let w1 = 0, w2 = 0;
  for (let g = 0; g < numGames; g++) {
    if (bo3 && (w1 >= 2 || w2 >= 2)) break;
    const gw = checkGameWinner(match.score1[g], match.score2[g]);
    if (gw === 1) w1++; else if (gw === 2) w2++;
    else {
      if (match.score1[g] !== null && match.score1[g] !== undefined &&
          match.score2[g] !== null && match.score2[g] !== undefined) return { valid: false };
      // Empty/null scores for remaining games in Bo3 are ok if someone already won 2
      if (bo3 && (w1 >= 2 || w2 >= 2)) break;
    }
  }
  if (!bo3) {
    if (w1 === 1) return { valid: true, winnerId: match.team1Id, loserId: match.team2Id };
    if (w2 === 1) return { valid: true, winnerId: match.team2Id, loserId: match.team1Id };
    return { valid: false };
  } else {
    if (w1 >= 2) return { valid: true, winnerId: match.team1Id, loserId: match.team2Id };
    if (w2 >= 2) return { valid: true, winnerId: match.team2Id, loserId: match.team1Id };
    return { valid: false };
  }
}

/* --- Populating draws --- */
function findMatch(eventData, drawType, matchId) {
  let draw;
  if (drawType === 'MD') draw = eventData.mainDraw;
  else if (drawType === 'CD') draw = eventData.consolationDraw;
  else if (drawType === 'WCD') draw = eventData.waterfallConsolationDraw;
  if (!draw || !draw.rounds) return null;
  for (const round of draw.rounds) {
    const m = round.find(x => x.id === matchId);
    if (m) return m;
  }
  return null;
}

function findMatchAcrossDraws(eventData, matchId) {
  if (matchId.startsWith('M')) return findMatch(eventData, 'MD', matchId);
  if (matchId.startsWith('WCD')) return findMatch(eventData, 'WCD', matchId);
  if (matchId.startsWith('CD')) return findMatch(eventData, 'CD', matchId);
  return null;
}

function getPlayerIdFromSource(eventData, source) {
  if (!source) return null;
  if (source.type === 'seed') return eventData.teams[source.slot] ? eventData.teams[source.slot].id : null;
  if (source.type === 'winner') {
    const sm = findMatchAcrossDraws(eventData, source.matchId);
    return (sm && sm.isComplete) ? sm.winnerId : null;
  }
  if (source.type === 'loser') {
    const sm = findMatchAcrossDraws(eventData, source.matchId);
    if (sm && sm.isComplete) {
      if (sm.isBye) {
        if (sm.team1Id === 'BYE' || sm.team2Id === 'BYE' || sm.winnerId === 'BYE') return 'BYE';
      }
      return sm.loserId;
    }
    return null;
  }
  return null;
}

function populateDraw(eventData, draw) {
  if (!draw || !draw.rounds) return;
  draw.rounds.forEach(round => {
    round.forEach(match => {
      if (match.isComplete && !match.isBye) return;
      if (!match.team1Id || match.team1Id === 'TBD') {
        const p = getPlayerIdFromSource(eventData, match.team1Source);
        if (p) match.team1Id = p;
      }
      if (!match.team2Id || match.team2Id === 'TBD') {
        const p = getPlayerIdFromSource(eventData, match.team2Source);
        if (p) match.team2Id = p;
      }
      if (!match.isComplete) {
        let byeWinner = null;
        if (match.team1Id === 'BYE' && match.team2Id && match.team2Id !== 'BYE' && match.team2Id !== 'TBD') byeWinner = match.team2Id;
        else if (match.team2Id === 'BYE' && match.team1Id && match.team1Id !== 'BYE' && match.team1Id !== 'TBD') byeWinner = match.team1Id;
        else if (match.team1Id === 'BYE' && match.team2Id === 'BYE') byeWinner = 'BYE';
        if (byeWinner) {
          match.winnerId = byeWinner;
          match.loserId = (byeWinner === match.team1Id) ? match.team2Id : match.team1Id;
          match.isComplete = true; match.isBye = true;
          match.score1 = []; match.score2 = [];
        }
      }
      // Feed losers to next bracket
      if (match.isComplete && match.loserId && match.loserFeedsToNextBracketMatchId && match.nextBracketType) {
        const target = findMatch(eventData, match.nextBracketType, match.loserFeedsToNextBracketMatchId);
        if (target && !target.isComplete) {
          if (match.loserFeedsToNextBracketSlotNumber === 1 && (!target.team1Id || target.team1Id === 'TBD')) target.team1Id = match.loserId;
          else if (match.loserFeedsToNextBracketSlotNumber === 2 && (!target.team2Id || target.team2Id === 'TBD')) target.team2Id = match.loserId;
          // Check for bye in target
          if (!target.isComplete) {
            let tw = null;
            if (target.team1Id === 'BYE' && target.team2Id && target.team2Id !== 'BYE' && target.team2Id !== 'TBD') tw = target.team2Id;
            else if (target.team2Id === 'BYE' && target.team1Id && target.team1Id !== 'BYE' && target.team1Id !== 'TBD') tw = target.team1Id;
            if (tw) { target.winnerId = tw; target.loserId = (tw === target.team1Id) ? target.team2Id : target.team1Id; target.isComplete = true; target.isBye = true; target.score1 = []; target.score2 = []; }
          }
        }
      }
    });
  });
}

function populateAllDraws(eventData) {
  for (let i = 0; i < 10; i++) {
    const snap = JSON.stringify([eventData.mainDraw, eventData.consolationDraw, eventData.waterfallConsolationDraw]);
    populateDraw(eventData, eventData.mainDraw);
    populateDraw(eventData, eventData.consolationDraw);
    populateDraw(eventData, eventData.waterfallConsolationDraw);
    if (JSON.stringify([eventData.mainDraw, eventData.consolationDraw, eventData.waterfallConsolationDraw]) === snap) break;
  }
}

/* --- Shuffle --- */
function fyShuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function getSchoolAndRank(teamId) {
  const m = teamId.match(/_s(\d+)_t(\d+)$/);
  return m ? { schoolNum: parseInt(m[1]), teamRank: parseInt(m[2]) } : { schoolNum: -1, teamRank: -1 };
}

function shuffleEventTeams(eventData) {
  const teams = [...eventData.teams];
  const t1s = [], t2s = [];
  teams.forEach(t => { const { teamRank } = getSchoolAndRank(t.id); if (teamRank === 1) t1s.push(t); else t2s.push(t); });
  fyShuffle(t1s); fyShuffle(t2s);

  const arr = new Array(TOTAL_TEAMS);
  const HALF = TOTAL_TEAMS / 2;
  const PER_HALF = NUM_SCHOOLS / 2;
  let topSlots = Array.from({ length: HALF }, (_, i) => i);
  let botSlots = Array.from({ length: HALF }, (_, i) => i + HALF);
  fyShuffle(topSlots); fyShuffle(botSlots);

  const loc = {};
  for (let i = 0; i < PER_HALF; i++) {
    arr[topSlots.pop()] = t1s[i];
    loc[getSchoolAndRank(t1s[i].id).schoolNum] = 'top';
  }
  for (let i = 0; i < PER_HALF; i++) {
    arr[botSlots.pop()] = t1s[PER_HALF + i];
    loc[getSchoolAndRank(t1s[PER_HALF + i].id).schoolNum] = 'bottom';
  }
  t2s.forEach(t => {
    const sn = getSchoolAndRank(t.id).schoolNum;
    if (loc[sn] === 'top') { arr[botSlots.pop()] = t; }
    else { arr[topSlots.pop()] = t; }
  });

  eventData.teams = arr;
  // Reset all draws
  [eventData.mainDraw, eventData.consolationDraw, eventData.waterfallConsolationDraw].forEach(draw => {
    if (!draw || !draw.rounds) return;
    draw.rounds.forEach(round => round.forEach(m => {
      m.team1Id = null; m.team2Id = null;
      m.score1 = []; m.score2 = [];
      m.winnerId = null; m.loserId = null;
      m.isComplete = false; m.isBye = false;
    }));
  });
}

/* --- CSV Export/Import --- */
function exportTeamsCSV(tournamentData) {
  let csv = "EventCode,EventName,TeamID,TeamOriginalSlot,TeamName\r\n";
  Object.keys(tournamentData).forEach(eid => {
    const ev = tournamentData[eid];
    if (ev && ev.teams) {
      ev.teams.forEach(t => {
        csv += `"${eid}","${EVENT_CODES[eid]}","${t.id}",${t.originalPlayerSlot},"${t.name.replace(/"/g, '""')}"\r\n`;
      });
    }
  });
  return csv;
}

function parseTeamsCSV(csvText) {
  const lines = csvText.split(/\r\n|\n/);
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
  const map = {};
  headers.forEach((h, i) => { map[h] = i; });
  if (!['EventCode', 'TeamID', 'TeamName'].every(k => k in map)) return { error: 'Missing required columns: EventCode, TeamID, TeamName' };
  const updates = [];
  for (let i = 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    const data = []; let cur = '', inQ = false;
    for (const ch of lines[i]) {
      if (ch === '"') inQ = !inQ;
      else if (ch === ',' && !inQ) { data.push(cur.trim().replace(/^"|"$/g, '')); cur = ''; }
      else cur += ch;
    }
    data.push(cur.trim().replace(/^"|"$/g, ''));
    updates.push({ eventCode: data[map.EventCode], teamId: data[map.TeamID], teamName: data[map.TeamName] });
  }
  return { updates };
}

   FIREBASE DATA LAYER
   All saves serialize; all loads deserialize.
   ═══════════════════════════════════════════════════════════ */

function generateShareCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code = '';
  for (let i = 0; i < 8; i++) code += chars[Math.floor(Math.random() * chars.length)];
  return code;
}

async function createTournament(name, userId) {
  const code = generateShareCode();
  const ref = await db.collection('tournaments').add({
    name, ownerId: userId, createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    shareCode: code, authorizedEditors: []
  });
  const tData = createFullTournamentData();
  const batch = db.batch();
  Object.keys(tData).forEach(eid => {
    batch.set(ref.collection('events').doc(eid), serializeEventForFirestore(tData[eid]));
  });
  await batch.commit();
  return { id: ref.id, shareCode: code };
}

async function loadTournamentMeta(tournamentId) {
  const snap = await db.collection('tournaments').doc(tournamentId).get();
  return snap.exists ? { id: snap.id, ...snap.data() } : null;
}

async function loadTournamentEvents(tournamentId) {
  const snap = await db.collection('tournaments').doc(tournamentId).collection('events').get();
  const data = {};
  snap.forEach(doc => { data[doc.id] = deserializeEventFromFirestore(doc.data()); });
  return data;
}

async function saveEventData(tournamentId, eventId, eventData) {
  await db.collection('tournaments').doc(tournamentId).collection('events').doc(eventId)
    .set(serializeEventForFirestore(eventData));
}

async function saveAllEvents(tournamentId, allEvents) {
  const batch = db.batch();
  Object.keys(allEvents).forEach(eid => {
    batch.set(
      db.collection('tournaments').doc(tournamentId).collection('events').doc(eid),
      serializeEventForFirestore(allEvents[eid])
    );
  });
  await batch.commit();
}

async function findTournamentByShareCode(code) {
  const snap = await db.collection('tournaments').where('shareCode', '==', code).limit(1).get();
  if (snap.empty) return null;
  const doc = snap.docs[0];
  return { id: doc.id, ...doc.data() };
}

async function getUserTournaments(userId) {
  const owned = await db.collection('tournaments').where('ownerId', '==', userId).get();
  const results = [];
  owned.forEach(doc => results.push({ id: doc.id, ...doc.data() }));
  // Sort client-side to avoid requiring a Firestore composite index
  results.sort((a, b) => {
    const ta = a.createdAt ? a.createdAt.seconds : 0;
    const tb = b.createdAt ? b.createdAt.seconds : 0;
    return tb - ta;
  });
  return results;
}

async function addEditor(tournamentId, email) {
  await db.collection('tournaments').doc(tournamentId).update({
    authorizedEditors: firebase.firestore.FieldValue.arrayUnion(email)
  });
}

async function deleteTournament(tournamentId) {
  const eventsSnap = await db.collection('tournaments').doc(tournamentId).collection('events').get();
  const batch = db.batch();
  eventsSnap.forEach(doc => batch.delete(doc.ref));
  batch.delete(db.collection('tournaments').doc(tournamentId));
  await batch.commit();
}

function subscribeToEvent(tournamentId, eventId, callback) {
  return db.collection('tournaments').doc(tournamentId).collection('events').doc(eventId).onSnapshot(snap => {
    if (snap.exists) callback(deserializeEventFromFirestore(snap.data()));
  });
}

      setTournaments([]);

    setLoading(false);

        <div className="top-bar-actions">
          <span className="user-badge">{user.email}</span>
          <button className="btn btn-sm" onClick={onSignOut}>Sign Out</button>
        </div>
      </div>

      <div className="card">
        <h2>Your Tournaments</h2>
        <div className="flex-row flex-wrap gap-2 mb-2">
          <button className="btn btn-primary btn-sm" onClick={() => setShowCreate(!showCreate)}>+ New Tournament</button>
          <button className="btn btn-sm" onClick={() => setShowJoin(!showJoin)}>Join by Code</button>
        </div>

        {showCreate && (
          <div className="flex-row mb-2" style={{ maxWidth: 400 }}>
            <input className="input" placeholder="Tournament name..." value={newName} onChange={e => setNewName(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleCreate()} />
            <button className="btn btn-green btn-sm" onClick={handleCreate} disabled={creating}>{creating ? '...' : 'Create'}</button>
          </div>
        )}

        {showJoin && (
          <div className="mb-2" style={{ maxWidth: 400 }}>
            <div className="flex-row">
              <input className="input" placeholder="Enter share code (e.g. AB3XK7NP)" value={joinCode} onChange={e => setJoinCode(e.target.value.toUpperCase())} maxLength={8} style={{ fontFamily: 'var(--font-mono)', letterSpacing: 2 }} />
              <button className="btn btn-sm btn-primary" onClick={handleJoin}>Join</button>
            </div>
            {joinError && <div className="auth-error mt-2">{joinError}</div>}
          </div>
        )}

        {loading ? (
          <div className="loading-center"><span className="spinner"></span> Loading...</div>
        ) : (
          <div className="tournament-grid mt-2">
            {tournaments.map(t => (
              <div key={t.id} className="tournament-tile" onClick={() => onSelect(t.id, false)}>
                <h3>{t.name}</h3>
                <div className="meta">Code: <strong style={{ fontFamily: 'var(--font-mono)' }}>{t.shareCode}</strong></div>
                <div className="meta">Created: {t.createdAt ? new Date(t.createdAt.seconds * 1000).toLocaleDateString() : '—'}</div>
                <button className="btn btn-danger btn-sm mt-2" onClick={e => { e.stopPropagation(); handleDelete(t.id, t.name); }}>Delete</button>
              </div>
            ))}
            {tournaments.length === 0 && <p className="text-dim">No tournaments yet. Create one to get started!</p>}
          </div>
        )}
      </div>
    </div>
  );
}

/* --- Share / QR Modal --- */
function ShareModal({ shareCode, onClose }) {
  const [qrDataUrl, setQrDataUrl] = useState(null);
  const shareUrl = `${window.location.origin}${window.location.pathname}?share=${shareCode}`;

  useEffect(() => {
    if (typeof QRCode !== 'undefined' && QRCode.toDataURL) {
      QRCode.toDataURL(shareUrl, {
        width: 220, margin: 2,

      })

      .catch(err => console.error('QR generation error:', err));

  }, [shareUrl]);

  const copyUrl = () => {
    navigator.clipboard.writeText(shareUrl).then(() => alert('Link copied!')).catch(() => {});
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-content" onClick={e => e.stopPropagation()}>
        <h2>📱 Share Tournament (Read-Only)</h2>
        <p className="text-dim text-sm mb-2">Scan this QR code or share the link. Viewers can see live results but cannot edit.</p>
        <div className="qr-container">
          {qrDataUrl ? (
            <img src={qrDataUrl} alt="QR Code" style={{ width: 220, height: 220, borderRadius: 'var(--radius)' }} />

            <div style={{ width: 220, height: 220, display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'var(--bg-input)', borderRadius: 'var(--radius)', color: 'var(--text-dim)', fontSize: '0.85rem' }}>

            <button className="btn btn-sm" onClick={onClose}>Close</button>

/* --- Match Card --- */
function MatchCard({ match, eventData, drawType, readOnly, onSave }) {
  const getName = (teamId) => {
    if (!teamId) return 'TBD';
    if (teamId === 'BYE') return 'BYE';
    const t = eventData.teams.find(x => x.id === teamId);
    return t ? t.name : teamId;
  };

  const bo3 = isBo3(match, drawType);
  const numGames = bo3 ? 3 : 1;
  const [scores1, setScores1] = useState(Array.from({ length: numGames }, (_, i) => match.score1[i] ?? ''));
  const [scores2, setScores2] = useState(Array.from({ length: numGames }, (_, i) => match.score2[i] ?? ''));

  useEffect(() => {
    setScores1(Array.from({ length: numGames }, (_, i) => match.score1[i] ?? ''));
    setScores2(Array.from({ length: numGames }, (_, i) => match.score2[i] ?? ''));
  }, [match.score1, match.score2, match.id]);

  const handleSave = () => {
    const s1 = scores1.map(v => v === '' ? null : parseInt(v));
    const s2 = scores2.map(v => v === '' ? null : parseInt(v));
    onSave(match.id, drawType, s1, s2);
  };

  const canSave = !readOnly && !match.isComplete && match.team1Id && match.team2Id && match.team1Id !== 'BYE' && match.team2Id !== 'BYE';
  let label = match.customLabel || match.id;
  if (bo3 && !label.toLowerCase().includes('best of 3')) label += ' (Bo3)';

  const t1cls = match.isComplete ? (match.winnerId === match.team1Id ? 'winner' : 'loser') : '';
  const t2cls = match.isComplete ? (match.winnerId === match.team2Id ? 'winner' : 'loser') : '';

  return (
    <div className={`match-card ${match.isComplete ? (match.isBye ? 'bye' : 'complete') : ''}`}>
      <div className="match-label">{label}</div>
      <div className={`match-team ${t1cls}`}>
        <span className="match-team-name">{getName(match.team1Id)}</span>
        <div className="match-scores">
          {Array.from({ length: numGames }).map((_, g) => (
            <input key={g} type="number" className="score-box" min={0} max={30} disabled={match.isComplete || readOnly}
              value={scores1[g]} onChange={e => { const a = [...scores1]; a[g] = e.target.value; setScores1(a); }} />
          ))}
        </div>
      </div>
      <div className={`match-team ${t2cls}`}>
        <span className="match-team-name">{getName(match.team2Id)}</span>
        <div className="match-scores">
          {Array.from({ length: numGames }).map((_, g) => (
            <input key={g} type="number" className="score-box" min={0} max={30} disabled={match.isComplete || readOnly}
              value={scores2[g]} onChange={e => { const a = [...scores2]; a[g] = e.target.value; setScores2(a); }} />
          ))}
        </div>
      </div>
      {canSave && <button className="match-save-btn" onClick={handleSave}>Save Score</button>}
      {match.isBye && <div className="match-bye-text">{getName(match.winnerId)} advances (BYE)</div>}
      {match.isComplete && !match.isBye && <div className="match-winner-text">✓ {getName(match.winnerId)}</div>}
    </div>
  );
}

/* --- Draw View --- */
function DrawView({ drawData, eventData, drawType, readOnly, onSave }) {
  if (!drawData || !drawData.rounds || drawData.rounds.length === 0) return <p className="text-dim" style={{padding:10}}>No draw data.</p>;
  const roundLabels = {
    MD: ['Round 1', 'Round 2', 'Quarter-Finals', 'Semi-Finals', 'Final', 'Championship'],
    CD: ['CD Round 1', 'CD Round 2', 'CD Playdown 1', 'CD vs QF Losers', 'CD Playdown 2', 'CD Semi-Finals', 'CD Final', '3rd Place'],
    WCD: ['WCD Round 1', 'WCD Semi-Finals', 'WCD Final']
  };
  const labels = roundLabels[drawType] || [];

  return (
    <div className="draw-container">
      {drawData.rounds.map((roundMatches, ri) => (
        <div key={ri} className="round-col">
          <div className="round-header">{labels[ri] || `Round ${ri + 1}`}</div>
          {roundMatches.map(m => (
            <MatchCard key={m.id} match={m} eventData={eventData} drawType={drawType} readOnly={readOnly} onSave={onSave} />
          ))}
        </div>
      ))}
    </div>
  );
}

/* --- Full Tournament View --- */
function TournamentView({ tournamentId, user, readOnly, onBack }) {
  const [meta, setMeta] = useState(null);
  const [events, setEvents] = useState(null);
  const [activeEvent, setActiveEvent] = useState('BS');
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  const [showShare, setShowShare] = useState(false);
  const [showEditor, setShowEditor] = useState(false);

  // Load tournament
  useEffect(() => {
    (async () => {
      setLoading(true);
      const m = await loadTournamentMeta(tournamentId);
      const ev = await loadTournamentEvents(tournamentId);
      // Ensure all events exist
      Object.keys(EVENT_CODES).forEach(eid => {
        if (!ev[eid]) ev[eid] = createEventObject(eid);
        // Ensure structure
        if (!ev[eid].teams || ev[eid].teams.length !== TOTAL_TEAMS) ev[eid].teams = createInitialTeams(eid);
        if (!ev[eid].mainDraw || !ev[eid].mainDraw.rounds || !Array.isArray(ev[eid].mainDraw.rounds)) ev[eid].mainDraw = generateMainDraw();
        if (!ev[eid].consolationDraw || !ev[eid].consolationDraw.rounds || !Array.isArray(ev[eid].consolationDraw.rounds)) ev[eid].consolationDraw = generateConsolationDraw();
        if (!ev[eid].waterfallConsolationDraw || !ev[eid].waterfallConsolationDraw.rounds || !Array.isArray(ev[eid].waterfallConsolationDraw.rounds)) ev[eid].waterfallConsolationDraw = generateWaterfallDraw();
        ev[eid].teams.forEach((t, idx) => {
          if (t.originalPlayerSlot === undefined) t.originalPlayerSlot = idx;
          t.mainDrawLosses = t.mainDrawLosses || 0;
          t.consolationLosses = t.consolationLosses || 0;
        });
        populateAllDraws(ev[eid]);
      });
      setMeta(m);
      setEvents(ev);
      setLoading(false);
    })();
  }, [tournamentId]);

  // Real-time listener for read-only mode
  useEffect(() => {
    if (!readOnly || !events) return;
    const unsubs = Object.keys(EVENT_CODES).map(eid =>
      subscribeToEvent(tournamentId, eid, (data) => {
        setEvents(prev => {
          const next = { ...prev, [eid]: data };
          // Ensure rounds are arrays after deserialization
          if (!Array.isArray(next[eid].mainDraw?.rounds)) next[eid].mainDraw = generateMainDraw();
          if (!Array.isArray(next[eid].consolationDraw?.rounds)) next[eid].consolationDraw = generateConsolationDraw();
          if (!Array.isArray(next[eid].waterfallConsolationDraw?.rounds)) next[eid].waterfallConsolationDraw = generateWaterfallDraw();
          if (data.teams) populateAllDraws(next[eid]);
          return next;
        });
      })
    );
    return () => unsubs.forEach(u => u());
  }, [readOnly, !!events, tournamentId]);

  const canEdit = !readOnly && meta && user && (meta.ownerId === user.uid || (meta.authorizedEditors && meta.authorizedEditors.includes(user.email)));

  const saveEvent = async (eid, eventData) => {
    setSaving(true);
    try { await saveEventData(tournamentId, eid, eventData); }
    catch (err) { alert('Save error: ' + err.message); }
    setSaving(false);
  };

  const handleScoreSave = async (matchId, drawType, s1, s2) => {
    if (!canEdit) return;
    const ev = JSON.parse(JSON.stringify(events[activeEvent]));
    const match = findMatch(ev, drawType, matchId);
    if (!match) return;
    match.score1 = s1; match.score2 = s2;
    const result = determineMatchWinner(match, drawType);
    if (!result.valid) { alert('Scores incomplete or invalid.'); return; }
    match.winnerId = result.winnerId;
    match.loserId = result.loserId;
    match.isComplete = true;
    // Track losses
    if (!match.isOverallChampionship && !match.isThirdPlacePlayoff) {
      const loser = ev.teams.find(t => t.id === match.loserId);
      if (loser) {
        if (drawType === 'MD') loser.mainDrawLosses = (loser.mainDrawLosses || 0) + 1;
        else if (drawType === 'CD') loser.consolationLosses = (loser.consolationLosses || 0) + 1;
      }
    }
    populateAllDraws(ev);
    const newEvents = { ...events, [activeEvent]: ev };
    setEvents(newEvents);
    await saveEvent(activeEvent, ev);
  };

  const handleSaveTeams = async () => {
    if (!canEdit) return;
    setSaving(true);
    try { await saveAllEvents(tournamentId, events); alert('All team names saved!'); }
    catch (err) { alert('Error: ' + err.message); }
    setSaving(false);
  };

  const handleShuffle = async () => {
    if (!canEdit) return;
    const ev = JSON.parse(JSON.stringify(events[activeEvent]));
    // Check for played matches
    const hasPlayed = [ev.mainDraw, ev.consolationDraw, ev.waterfallConsolationDraw].some(draw =>
      draw && draw.rounds && draw.rounds.some(round => round.some(m => m.isComplete && !m.isBye))
    );
    if (hasPlayed) { alert('Cannot shuffle: matches have been played. Reset first.'); return; }
    if (!confirm(`Shuffle entries for ${EVENT_CODES[activeEvent]}?`)) return;
    shuffleEventTeams(ev);
    populateAllDraws(ev);
    const newEvents = { ...events, [activeEvent]: ev };
    setEvents(newEvents);
    await saveEvent(activeEvent, ev);
    alert('Shuffled!');
  };

  const handleResetEvent = async () => {
    if (!canEdit) return;
    if (!confirm(`Reset ALL data for ${EVENT_CODES[activeEvent]}? This cannot be undone.`)) return;
    const fresh = createEventObject(activeEvent);
    const newEvents = { ...events, [activeEvent]: fresh };
    setEvents(newEvents);
    await saveEvent(activeEvent, fresh);
    alert('Event reset.');
  };

  const handleExportJSON = () => {
    const blob = new Blob([JSON.stringify(events, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `tournament_${tournamentId}_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(a.href);
  };

  const handleImportJSON = () => {
    if (!canEdit) return;
    const inp = document.createElement('input');
    inp.type = 'file'; inp.accept = '.json';
    inp.onchange = async (e) => {
      const file = e.target.files[0]; if (!file) return;
      if (!confirm('Import will overwrite ALL event data. Continue?')) return;
      const text = await file.text();
      try {
        const imported = JSON.parse(text);
        Object.keys(EVENT_CODES).forEach(eid => {
          if (!imported[eid]) imported[eid] = createEventObject(eid);
          if (!imported[eid].teams || imported[eid].teams.length !== TOTAL_TEAMS) imported[eid].teams = createInitialTeams(eid);
          if (!imported[eid].mainDraw || !imported[eid].mainDraw.rounds) imported[eid].mainDraw = generateMainDraw();
          if (!imported[eid].consolationDraw || !imported[eid].consolationDraw.rounds) imported[eid].consolationDraw = generateConsolationDraw();
          if (!imported[eid].waterfallConsolationDraw || !imported[eid].waterfallConsolationDraw.rounds) imported[eid].waterfallConsolationDraw = generateWaterfallDraw();
          // Handle case where imported JSON has object-style rounds (from a previous Firestore export)
          imported[eid].mainDraw = deserializeDrawFromFirestore(imported[eid].mainDraw);
          imported[eid].consolationDraw = deserializeDrawFromFirestore(imported[eid].consolationDraw);
          imported[eid].waterfallConsolationDraw = deserializeDrawFromFirestore(imported[eid].waterfallConsolationDraw);
          imported[eid].teams.forEach((t, idx) => {
            if (t.originalPlayerSlot === undefined) t.originalPlayerSlot = idx;
            t.mainDrawLosses = t.mainDrawLosses || 0;
            t.consolationLosses = t.consolationLosses || 0;
          });
          populateAllDraws(imported[eid]);
        });
        setEvents(imported);
        await saveAllEvents(tournamentId, imported);
        alert('Imported!');
      } catch (err) { alert('Invalid file: ' + err.message); }
    };
    inp.click();
  };

  const handleExportCSV = () => {
    const csv = exportTeamsCSV(events);
    const blob = new Blob([csv], { type: 'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `teams_${tournamentId}.csv`;
    a.click();
    URL.revokeObjectURL(a.href);
  };

  const handleImportCSV = () => {
    if (!canEdit) return;
    const inp = document.createElement('input');
    inp.type = 'file'; inp.accept = '.csv';
    inp.onchange = async (e) => {
      const file = e.target.files[0]; if (!file) return;
      if (!confirm('Import team names from CSV?')) return;
      const text = await file.text();
      const result = parseTeamsCSV(text);
      if (result.error) { alert(result.error); return; }
      const evCopy = JSON.parse(JSON.stringify(events));
      let count = 0;
      result.updates.forEach(u => {
        if (evCopy[u.eventCode] && evCopy[u.eventCode].teams) {
          const team = evCopy[u.eventCode].teams.find(t => t.id === u.teamId);
          if (team && team.name !== u.teamName) { team.name = u.teamName; count++; }
        }
      });
      if (count > 0) {
        setEvents(evCopy);
        await saveAllEvents(tournamentId, evCopy);
        alert(`${count} team name(s) updated.`);
      } else { alert('No names changed.'); }
    };
    inp.click();
  };

  const updateTeamName = (eventId, teamId, name) => {
    setEvents(prev => {
      const next = { ...prev };
      next[eventId] = { ...next[eventId], teams: next[eventId].teams.map(t => t.id === teamId ? { ...t, name } : t) };
      return next;
    });
  };

  if (loading) return <div className="loading-center"><span className="spinner"></span> Loading tournament...</div>;
  if (!meta || !events) return <div className="app-shell"><div className="card"><p>Tournament not found.</p><button className="btn" onClick={onBack}>Back</button></div></div>;

  const ev = events[activeEvent];
  if (ev) populateAllDraws(ev);

  return (
    <div className="app-shell">
      <div className="top-bar">
        <h1>
          <span style={{cursor:'pointer', opacity: 0.7, fontSize: '0.9em'}} onClick={onBack}>←</span>
          <span className="icon">🏸</span>
          {meta.name}
        </h1>
        <div className="top-bar-actions">
          {saving && <span className="text-dim text-sm">Saving...</span>}
          {!readOnly && <button className="btn btn-sm btn-purple" onClick={() => setShowShare(true)}>📱 Share QR</button>}
          {!readOnly && <button className="btn btn-sm" onClick={() => setShowEditor(true)}>👥 Editors</button>}
          {!readOnly && user && <span className="user-badge">{user.email}</span>}
          {readOnly && <span className="user-badge" style={{background:'var(--orange-dim)', color:'var(--orange)'}}>View Only</span>}
          {!readOnly && <button className="btn btn-sm" onClick={onBack}>My Tournaments</button>}
        </div>
      </div>

      {readOnly && <div className="readonly-banner">🔒 Read-only view — scores and teams cannot be edited</div>}

      {canEdit && (
        <div className="controls-bar">
          <button className="btn btn-green btn-sm" onClick={handleSaveTeams}>💾 Save Teams</button>
          <button className="btn btn-orange btn-sm" onClick={handleShuffle}>🔀 Shuffle Event</button>
          <button className="btn btn-danger btn-sm" onClick={handleResetEvent}>🗑 Reset Event</button>
          <span className="sep"></span>
          <button className="btn btn-sm" onClick={handleExportJSON}>⬇ Export JSON</button>
          <button className="btn btn-sm" onClick={handleImportJSON}>⬆ Import JSON</button>
          <span className="sep"></span>
          <button className="btn btn-sm" onClick={handleExportCSV}>⬇ Teams CSV</button>
          <button className="btn btn-sm" onClick={handleImportCSV}>⬆ Teams CSV</button>
        </div>
      )}

      <div className="event-tabs">
        {Object.keys(EVENT_CODES).map(eid => (
          <button key={eid} className={`event-tab ${eid === activeEvent ? 'active' : ''}`} onClick={() => setActiveEvent(eid)}>
            {EVENT_CODES[eid]}
          </button>
        ))}
      </div>

      {ev && (
        <>
          {/* Team Names */}
          <div className="card">
            <h3>Team Entries — {EVENT_CODES[activeEvent]}</h3>
            <div className="team-grid">
              {ev.teams.map((team, idx) => (
                <div key={team.id} className="team-row">
                  <label>{idx + 1}.</label>
                  <input value={team.name} disabled={!canEdit}
                    onChange={e => updateTeamName(activeEvent, team.id, e.target.value)} />
                </div>
              ))}
            </div>
          </div>

          {/* Main Draw */}
          <div className="card draw-section">
            <h3>Main Draw</h3>
            <DrawView drawData={ev.mainDraw} eventData={ev} drawType="MD" readOnly={!canEdit} onSave={handleScoreSave} />
          </div>

          {/* Consolation Draw */}
          <div className="card draw-section">
            <h3>Consolation Draw</h3>
            <DrawView drawData={ev.consolationDraw} eventData={ev} drawType="CD" readOnly={!canEdit} onSave={handleScoreSave} />
          </div>

          {/* Waterfall Consolation */}
          <div className="card draw-section">
            <h3>Waterfall Consolations</h3>
            <DrawView drawData={ev.waterfallConsolationDraw} eventData={ev} drawType="WCD" readOnly={!canEdit} onSave={handleScoreSave} />
          </div>
        </>
      )}

      {showShare && meta && <ShareModal shareCode={meta.shareCode} onClose={() => setShowShare(false)} />}
      {showEditor && <AddEditorModal tournamentId={tournamentId} onClose={() => setShowEditor(false)} />}
    </div>
  );
}

/* --- Read-Only Entry via share code --- */
function ReadOnlyLoader({ shareCode }) {
  const [tournamentId, setTournamentId] = useState(null);
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    (async () => {
      try {
        // Sign in anonymously for read access
        if (!auth.currentUser) {
          await auth.signInAnonymously();
        }
        const meta = await findTournamentByShareCode(shareCode);
        if (meta) { setTournamentId(meta.id); }
        else { setError('Tournament not found.'); }
      } catch (err) { setError('Error: ' + err.message); }
      setLoading(false);
    })();
  }, [shareCode]);

  if (loading) return <div className="loading-center"><span className="spinner"></span> Loading shared tournament...</div>;
  if (error) return (
    <div className="auth-wrapper">
      <div className="card auth-card text-center">
        <h1>🏸</h1>
        <p className="text-dim">{error}</p>
        <a href={window.location.pathname} className="btn btn-primary mt-4" style={{textDecoration:'none'}}>Go to App</a>
      </div>
    </div>
  );
  return <TournamentView tournamentId={tournamentId} user={null} readOnly={true} onBack={() => { window.location.href = window.location.pathname; }} />;
}

/* --- App Root --- */
function App() {
  const [user, setUser] = useState(undefined); // undefined = loading
  const [view, setView] = useState('list'); // list | tournament
  const [selectedTournament, setSelectedTournament] = useState(null);

  // Check for share code in URL
  const params = new URLSearchParams(window.location.search);
  const shareCode = params.get('share');

  useEffect(() => {
    if (!IS_CONFIGURED) { setUser(null); return; }
    const unsub = auth.onAuthStateChanged(u => {
      // Don't update user state if we're in share mode (anonymous auth)
      if (shareCode) return;
      setUser(u);
    });
    return unsub;
  }, []);

  if (!IS_CONFIGURED) return <SetupGuide />;
  if (shareCode) return <ReadOnlyLoader shareCode={shareCode} />;
  if (user === undefined) return <div className="loading-center"><span className="spinner"></span> Initializing...</div>;
  if (!user) return <AuthScreen />;

  const handleSelectTournament = (id, readOnly) => {
    setSelectedTournament({ id, readOnly });
    setView('tournament');
  };

  const handleBack = () => {
    setSelectedTournament(null);
    setView('list');
  };

  if (view === 'tournament' && selectedTournament) {
    return <TournamentView tournamentId={selectedTournament.id} user={user} readOnly={selectedTournament.readOnly} onBack={handleBack} />;
  }

  return <TournamentList user={user} onSelect={handleSelectTournament} onSignOut={() => auth.signOut()} />;
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
